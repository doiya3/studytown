<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Town - SPA Scaffold</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --line: rgba(255, 255, 255, 0.08);
    --accent: #30c878;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
  }

  #game-root {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }

  canvas {
    display: block;
  }

  .overlay-ui {
    position: fixed;
    z-index: 20;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(13, 17, 23, 0.55);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    color: var(--text);
    transition: opacity 0.4s ease;
    user-select: none;
  }

  .idle .overlay-ui {
    opacity: 0.15;
  }

  .zone-widget {
    top: 16px;
    left: 16px;
    height: 42px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    cursor: pointer;
  }

  .zone-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(48, 200, 120, 0.7);
    animation: pulse 1.8s ease-in-out infinite;
  }

  .zone-arrow {
    color: var(--text-muted);
    font-size: 0.72rem;
  }

  #scene-menu {
    position: fixed;
    top: 64px;
    left: 16px;
    z-index: 21;
    display: none;
    min-width: 180px;
    padding: 8px;
    border-radius: 12px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(13, 17, 23, 0.72);
    border: 0.5px solid rgba(255, 255, 255, 0.14);
  }

  #scene-menu.open {
    display: block;
  }

  .scene-option {
    width: 100%;
    background: transparent;
    color: var(--text);
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 8px 10px;
    text-align: left;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .scene-option:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.12);
  }

  .scene-option.active {
    background: rgba(124, 140, 248, 0.16);
    border-color: rgba(124, 140, 248, 0.35);
  }

  .profile-widget {
    top: 16px;
    right: 16px;
    min-height: 54px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .p-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .p-name {
    font-size: 0.82rem;
    font-weight: 700;
  }

  .p-level {
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .p-divider {
    width: 1px;
    align-self: stretch;
    background: rgba(255, 255, 255, 0.12);
  }

  .p-logout {
    background: rgba(233, 69, 96, 0.15);
    border: 1px solid rgba(233, 69, 96, 0.35);
    color: #ff6980;
    border-radius: 10px;
    font-size: 0.75rem;
    padding: 6px 10px;
    cursor: default;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .team-widget {
    left: 16px;
    bottom: 16px;
    min-width: 170px;
    min-height: 64px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .team-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .team-item {
    font-size: 0.8rem;
  }

  .interact-btn {
    right: 16px;
    bottom: 16px;
    height: 44px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-color: rgba(255, 255, 255, 0.12);
  }

  .interact-key {
    font-family: 'DotGothic16', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 7px;
    padding: 2px 6px;
    line-height: 1;
  }

  #interaction-hint {
    position: fixed;
    left: 50%;
    bottom: 72px;
    transform: translateX(-50%);
    z-index: 22;
    display: none;
    padding: 8px 14px;
    border-radius: 12px;
    color: var(--text);
    font-size: 0.78rem;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(13, 17, 23, 0.72);
    border: 0.5px solid rgba(255, 255, 255, 0.16);
  }

  @media (max-width: 768px) {
    .zone-widget,
    .profile-widget,
    .team-widget,
    .interact-btn {
      border-radius: 12px;
    }

    .zone-widget {
      top: 10px;
      left: 10px;
      font-size: 0.74rem;
      padding: 0 10px;
    }

    .profile-widget {
      top: 10px;
      right: 10px;
      gap: 8px;
      padding: 7px 9px;
    }

    .p-avatar {
      width: 28px;
      height: 28px;
    }

    .p-level {
      font-size: 0.68rem;
    }

    .p-logout {
      padding: 5px 8px;
      font-size: 0.7rem;
    }

    .team-widget {
      left: 10px;
      bottom: 10px;
      min-width: 150px;
      padding: 9px 10px;
    }

    .interact-btn {
      right: 10px;
      bottom: 10px;
      height: 40px;
      padding: 0 10px;
    }

    .interact-key {
      display: none;
    }
  }

  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
      opacity: 0.9;
    }
    50% {
      transform: scale(1.25);
      opacity: 0.55;
    }
  }
</style>
</head>
<body>
<div id="game-root"></div>

<div class="overlay-ui zone-widget" aria-label="zone-widget">
  <div class="zone-dot"></div>
  <span id="zone-name">圖書館</span>
  <span id="zone-count">· 1 人</span>
  <span class="zone-arrow">▼</span>
</div>

<div id="scene-menu" aria-label="scene-menu">
  <button class="scene-option" data-scene="map">🏠 地圖</button>
  <button class="scene-option" data-scene="library">📚 圖書館</button>
  <button class="scene-option" data-scene="cafe">☕ 咖啡廳</button>
</div>

<div class="overlay-ui profile-widget" aria-label="profile-widget">
  <div class="p-avatar" aria-hidden="true"></div>
  <div>
    <div class="p-name">sev.nishi</div>
    <div class="p-level">Lv.8 · 2400 XP</div>
  </div>
  <div class="p-divider"></div>
  <button class="p-logout" type="button">登出</button>
</div>

<div class="overlay-ui team-widget" id="team-widget" aria-label="team-widget">
  <div class="team-label">隊伍</div>
  <div class="team-item">bear.nishi</div>
</div>

<div class="overlay-ui interact-btn" id="interact-btn" aria-label="interact-btn">
  <span class="interact-text">互動</span>
  <span class="interact-key">E</span>
</div>

<div id="interaction-hint">按 E 互動</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script type="module">
  import { createSpaRuntime } from './js/common/spaRuntime.js';
  import { MapScene } from './js/scenes/MapScene.js';
  import { LibraryScene } from './js/scenes/LibraryScene.js';
  import { CafeScene } from './js/scenes/CafeScene.js';

  const SCENE_MAP = {
    map: { key: 'MapScene', label: '地圖', sceneName: '小鎮' },
    library: { key: 'LibraryScene', label: '圖書館', sceneName: '圖書館' },
    cafe: { key: 'CafeScene', label: '咖啡廳', sceneName: '咖啡廳' },
  };

  const params = new URLSearchParams(window.location.search);
  let activeScene = SCENE_MAP[params.get('scene')] ? params.get('scene') : 'map';

  const runtime = createSpaRuntime();
  const game = new Phaser.Game({
    type: Phaser.AUTO,
    parent: 'game-root',
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#0d1117',
    scale: {
      mode: Phaser.Scale.RESIZE,
      autoCenter: Phaser.Scale.CENTER_BOTH,
    },
    scene: [MapScene, LibraryScene, CafeScene],
    pixelArt: true,
    antialias: false,
  });

  function updateHeader(sceneKey) {
    const conf = SCENE_MAP[sceneKey];
    const zoneName = document.getElementById('zone-name');
    if (zoneName) zoneName.textContent = conf.label;
    document.querySelectorAll('.scene-option').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.scene === sceneKey);
    });
  }

  async function switchScene(sceneKey) {
    if (!SCENE_MAP[sceneKey] || sceneKey === activeScene) return;
    const previousSceneName = SCENE_MAP[activeScene].sceneName;
    runtime.leaveScene(previousSceneName);
    await runtime.postJSON('/api/users/clear-location', { discord_id: runtime.session.id });
    const currentKey = SCENE_MAP[activeScene].key;
    game.scene.stop(currentKey);
    activeScene = sceneKey;
    runtime.setSceneName(SCENE_MAP[sceneKey].sceneName);
    game.scene.start(SCENE_MAP[sceneKey].key, { runtime, spawnPoint: 'door' });
    updateHeader(sceneKey);
    const url = new URL(window.location.href);
    url.searchParams.set('scene', sceneKey);
    window.history.replaceState({}, '', url.toString());
  }

  window.switchSpaScene = switchScene;

  game.scene.start(SCENE_MAP[activeScene].key, { runtime });
  updateHeader(activeScene);

  const zoneWidget = document.querySelector('.zone-widget');
  const sceneMenu = document.getElementById('scene-menu');
  zoneWidget?.addEventListener('click', (e) => {
    e.stopPropagation();
    sceneMenu?.classList.toggle('open');
  });
  document.querySelectorAll('.scene-option').forEach((btn) => {
    btn.addEventListener('click', async () => {
      sceneMenu?.classList.remove('open');
      await switchScene(btn.dataset.scene);
    });
  });
  document.addEventListener('click', (e) => {
    if (!sceneMenu || !zoneWidget) return;
    if (!sceneMenu.contains(e.target) && !zoneWidget.contains(e.target)) {
      sceneMenu.classList.remove('open');
    }
  });

  const profileName = document.querySelector('.p-name');
  const avatar = document.querySelector('.p-avatar');
  const logoutBtn = document.querySelector('.p-logout');
  if (profileName) profileName.textContent = runtime.session.displayName;
  if (avatar) {
    if (runtime.session.avatarMode === 'discord' && runtime.session.avatarUrl) {
      avatar.style.backgroundImage = `url(${runtime.session.avatarUrl})`;
      avatar.style.backgroundSize = 'cover';
      avatar.style.backgroundPosition = 'center';
    } else {
      avatar.textContent = '？';
      avatar.style.display = 'flex';
      avatar.style.alignItems = 'center';
      avatar.style.justifyContent = 'center';
      avatar.style.color = '#8b949e';
      avatar.style.fontFamily = 'DotGothic16, monospace';
    }
  }
  logoutBtn?.addEventListener('click', () => {
    localStorage.removeItem('study_user');
    localStorage.removeItem('study_avatar_mode');
    window.location.href = 'index.html';
  });

  const interactBtn = document.getElementById('interact-btn');
  if (interactBtn) {
    interactBtn.addEventListener('click', () => {
      const key = SCENE_MAP[activeScene].key;
      const scene = game.scene.getScene(key);
      if (scene?.tryInteract) scene.tryInteract();
    });
  }

  window.addEventListener('beforeunload', () => {
    runtime.destroy();
    navigator.sendBeacon(
      `${runtime.API_URL}/api/users/clear-location`,
      new Blob([JSON.stringify({ discord_id: runtime.session.id })], { type: 'application/json' }),
    );
  });

  window.studyTownApp = game;
</script>
</body>
</html>
