<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人資料 — Study Town</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0d1117;
    --bg2:        #161b22;
    --panel:      rgba(22, 27, 34, 0.95);
    --border:     rgba(255, 255, 255, 0.08);
    --accent:     #30c878;
    --text:       #e6edf3;
    --text-muted: #8b949e;
    --danger:     #e95f5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(48,200,120,0.08), transparent 35%),
      radial-gradient(circle at 80% 10%, rgba(90,160,255,0.08), transparent 32%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    color: var(--text);
    min-height: 100vh;
    padding-top: 58px;
  }

  #hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
    z-index: 100;
  }

  #hud-title {
    font-family: 'DotGothic16', monospace;
    color: var(--accent);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
  }

  #hud-back {
    text-decoration: none;
    color: var(--text-muted);
    font-size: 0.76rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    transition: all 0.2s;
  }

  #hud-back:hover {
    color: var(--text);
    border-color: rgba(48,200,120,0.4);
    background: rgba(48,200,120,0.08);
  }

  .container {
    max-width: 880px;
    margin: 16px auto 32px;
    padding: 0 14px;
    display: grid;
    gap: 14px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
  }

  .section-title {
    font-family: 'DotGothic16', monospace;
    color: var(--text);
    font-size: 0.86rem;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  #profile-header {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  #profile-avatar {
    width: 74px;
    height: 74px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(48,200,120,0.35);
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #avatar-fallback {
    font-size: 2rem;
    color: var(--text-muted);
  }

  #profile-username {
    font-size: 1.08rem;
    font-weight: 700;
  }

  #profile-level {
    margin-top: 4px;
    color: var(--accent);
    font-family: 'DotGothic16', monospace;
    font-size: 0.82rem;
  }

  #status-input,
  #bio-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 10px;
    font-size: 0.86rem;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
  }

  #status-input:focus,
  #bio-input:focus {
    border-color: rgba(48,200,120,0.45);
  }

  #bio-input {
    resize: vertical;
    min-height: 84px;
  }

  #bio-count {
    margin-top: 6px;
    font-size: 0.74rem;
    color: var(--text-muted);
    text-align: right;
  }

  #profile-form-actions {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  #privacy-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  #btn-save-profile {
    border: none;
    background: linear-gradient(135deg, #30c878, #22a060);
    color: #06140d;
    font-weight: 700;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 0.8rem;
    cursor: pointer;
  }

  #btn-save-profile:hover { opacity: 0.9; }

  #save-status {
    margin-top: 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
    min-height: 1em;
  }

  #stats-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
  }

  .stat-label {
    color: var(--text-muted);
    font-size: 0.72rem;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 0.85rem;
    font-weight: 700;
  }

  #xp-label,
  #xp-text {
    font-size: 0.76rem;
    color: var(--text-muted);
  }

  #xp-bar-bg {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
    margin: 6px 0;
  }

  #xp-bar-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #30c878, #22a060);
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  #recent-list {
    display: grid;
    gap: 8px;
  }

  .recent-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 10px;
    background: rgba(255,255,255,0.03);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 0.8rem;
  }

  .recent-main {
    display: flex;
    gap: 10px;
    color: var(--text);
    flex-wrap: wrap;
  }

  .recent-date {
    color: var(--text-muted);
    white-space: nowrap;
  }

  #empty-recent {
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 8px 2px;
  }

  .identity-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .identity-option {
    cursor: pointer;
  }

  .identity-option input[type="radio"] {
    display: none;
  }

  .identity-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    transition: all 0.2s;
  }

  .identity-option input[type="radio"]:checked + .identity-card {
    background: rgba(48,200,120,0.08);
    border-color: rgba(48,200,120,0.3);
  }

  .identity-card:hover {
    background: rgba(255,255,255,0.06);
  }

  .identity-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .identity-anon {
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    color: #8b949e;
    font-family: 'DotGothic16', monospace;
  }

  .identity-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: #e6edf3;
    margin-bottom: 2px;
  }

  .identity-desc {
    font-size: 0.72rem;
    color: #8b949e;
  }

  @media (max-width: 760px) {
    #stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    #profile-header { align-items: flex-start; }
  }
</style>
</head>
<body>
  <div id="hud">
    <div id="hud-title">👤 個人資料</div>
    <a id="hud-back" href="index.html">← 返回大廳</a>
  </div>

  <main class="container">
    <section class="panel">
      <div id="profile-header">
        <div id="profile-avatar">
          <img id="avatar-img" src="" alt="avatar">
          <div id="avatar-fallback">👤</div>
        </div>
        <div id="profile-info" style="width:100%;">
          <div id="profile-username">載入中...</div>
          <div id="profile-level">Lv.1</div>
          <div id="profile-status" style="margin-top:8px;">
            <input id="status-input" placeholder="新增狀態..." maxlength="30">
          </div>
        </div>
      </div>
    </section>

    <section class="panel" id="profile-bio-section">
      <div class="section-title">自我介紹</div>
      <textarea id="bio-input" placeholder="介紹一下自己吧..." maxlength="100"></textarea>
      <div id="bio-count">0 / 100</div>
      <div id="profile-form-actions">
        <label id="privacy-row">
          <input type="checkbox" id="profile-public-checkbox" checked>
          <span>允許其他玩家查看資料</span>
        </label>
        <button id="btn-save-profile">儲存</button>
      </div>
      <div id="save-status"></div>
    </section>

    <section class="panel" id="stats-section">
      <div class="section-title">學習統計</div>
      <div id="stats-grid">
        <div class="stat-card">
          <div class="stat-label">今日</div>
          <div class="stat-value" id="stat-today">0 分</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本週</div>
          <div class="stat-value" id="stat-week">0 分</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本月</div>
          <div class="stat-value" id="stat-month">0 分</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">總計</div>
          <div class="stat-value" id="stat-total">0 分</div>
        </div>
      </div>
    </section>

    <section class="panel" id="xp-section">
      <div id="xp-label">Lv.1 → Lv.2</div>
      <div id="xp-bar-bg">
        <div id="xp-bar-fill"></div>
      </div>
      <div id="xp-text">0 / 100 XP</div>
    </section>

    <section class="panel" id="identity-section">
      <div class="section-title">身分設定</div>
      <div class="identity-options">
        <label class="identity-option">
          <input type="radio" name="avatar-mode" value="discord" id="mode-discord">
          <div class="identity-card">
            <img id="identity-discord-avatar" src="" class="identity-avatar" alt="discord avatar">
            <div class="identity-info">
              <div class="identity-name" id="identity-discord-name"></div>
              <div class="identity-desc">使用 Discord 頭貼和名稱</div>
            </div>
          </div>
        </label>
        <label class="identity-option">
          <input type="radio" name="avatar-mode" value="anonymous" id="mode-anonymous">
          <div class="identity-card">
            <div class="identity-avatar identity-anon">？</div>
            <div class="identity-info">
              <div class="identity-name">同學</div>
              <div class="identity-desc">隱藏名稱和頭貼，顯示為匿名</div>
            </div>
          </div>
        </label>
      </div>
    </section>

    <section class="panel" id="recent-section">
      <div class="section-title">最近紀錄</div>
      <div id="recent-list"></div>
      <div id="empty-recent" style="display:none;">尚無學習紀錄</div>
    </section>
  </main>

<script>
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
const API_URL = IS_LOCAL ? 'http://localhost:3000' : 'https://verification-difference-doctor-tournament.trycloudflare.com'

const sessionRaw = localStorage.getItem('study_user')
const sessionUser = sessionRaw ? JSON.parse(sessionRaw) : null

if (!sessionUser || !sessionUser.id) {
  window.location.href = 'index.html'
}

const MY_DISCORD_ID = sessionUser.id

function getSelectedAvatarMode() {
  return document.querySelector('input[name="avatar-mode"]:checked')?.value || 'discord'
}

function setSelectedAvatarMode(mode) {
  const target = mode === 'anonymous' ? 'anonymous' : 'discord'
  const el = document.querySelector(`input[name="avatar-mode"][value="${target}"]`)
  if (el) el.checked = true
}

function renderIdentityPreview() {
  document.getElementById('identity-discord-avatar').src = sessionUser?.avatar_url || ''
  document.getElementById('identity-discord-name').textContent = sessionUser?.username || 'Discord 使用者'
}

function formatMinutes(min) {
  const safeMin = Math.max(0, Math.floor(min || 0))
  if (safeMin < 60) return `${safeMin} 分`
  const h = Math.floor(safeMin / 60)
  const m = safeMin % 60
  return m > 0 ? `${h} 小時 ${m} 分` : `${h} 小時`
}

function formatDateTime(dateStr) {
  const d = new Date(dateStr)
  if (Number.isNaN(d.getTime())) return '-'
  return d.toLocaleDateString('zh-TW')
}

function calcLevel(xp) {
  if (xp < 100) return 1
  if (xp < 250) return 2
  if (xp < 500) return 3
  if (xp < 900) return 4
  if (xp < 1400) return 5
  return Math.floor(xp / 300) + 1
}

function xpForLevel(level) {
  const thresholds = [0, 100, 250, 500, 900, 1400]
  if (level <= 5) return thresholds[level]
  return level * 300
}

function renderXP(xp) {
  const level = calcLevel(xp)
  const currentLevelXp = xpForLevel(level - 1)
  const nextLevelXp = xpForLevel(level)
  const progress = Math.max(0, xp - currentLevelXp)
  const need = Math.max(1, nextLevelXp - currentLevelXp)
  const percentage = Math.min(100, Math.round((progress / need) * 100))

  document.getElementById('profile-level').textContent = `Lv.${level}`
  document.getElementById('xp-label').textContent = `Lv.${level} → Lv.${level + 1}`
  document.getElementById('xp-text').textContent = `${progress} / ${need} XP`
  document.getElementById('xp-bar-fill').style.width = `${percentage}%`
}

function setSaveStatus(text, isError) {
  const el = document.getElementById('save-status')
  el.textContent = text || ''
  el.style.color = isError ? 'var(--danger)' : 'var(--text-muted)'
}

function renderRecent(list) {
  const recentList = document.getElementById('recent-list')
  const emptyEl = document.getElementById('empty-recent')
  recentList.innerHTML = ''

  if (!Array.isArray(list) || list.length === 0) {
    emptyEl.style.display = 'block'
    return
  }

  emptyEl.style.display = 'none'
  list.forEach((item) => {
    const row = document.createElement('div')
    row.className = 'recent-item'
    row.innerHTML = `
      <div class="recent-main">
        <span>${item.zone || '未知區域'}</span>
        <span>${formatMinutes(item.duration_minutes || 0)}</span>
        <span>+${item.xp_earned || 0} XP</span>
      </div>
      <div class="recent-date">${formatDateTime(item.start_time)}</div>
    `
    recentList.appendChild(row)
  })
}

async function loadProfile() {
  const res = await fetch(`${API_URL}/api/users/${MY_DISCORD_ID}/profile?viewer_id=${MY_DISCORD_ID}`)
  if (res.status === 404) {
    return {
      username: sessionUser.username || '未知玩家',
      status_text: '',
      bio: '',
      is_profile_public: true,
      discord_avatar: sessionUser.avatar || null,
      discord_id: MY_DISCORD_ID
    }
  }
  if (!res.ok) throw new Error('profile load failed')
  const data = await res.json()

  document.getElementById('profile-username').textContent = data.username || sessionUser.username || '未知玩家'
  document.getElementById('status-input').value = data.status_text || ''
  document.getElementById('bio-input').value = data.bio || ''
  document.getElementById('profile-public-checkbox').checked = data.is_profile_public !== false
  setSelectedAvatarMode(data.avatar_mode || sessionUser.avatar_mode || localStorage.getItem('study_avatar_mode') || 'discord')
  renderIdentityPreview()

  const bioLen = (data.bio || '').length
  document.getElementById('bio-count').textContent = `${bioLen} / 100`

  const avatar = data.discord_avatar
    ? `https://cdn.discordapp.com/avatars/${data.discord_id}/${data.discord_avatar}.png?size=128`
    : (sessionUser.avatar_url || '')

  if (avatar) {
    const img = document.getElementById('avatar-img')
    img.src = avatar
    img.style.display = 'block'
    document.getElementById('avatar-fallback').style.display = 'none'
  }

  return data
}

async function loadStats() {
  const res = await fetch(`${API_URL}/api/users/${MY_DISCORD_ID}/stats`)
  if (res.status === 404) {
    const fallback = { today: 0, week: 0, month: 0, total: 0, xp: 0 }
    document.getElementById('stat-today').textContent = formatMinutes(0)
    document.getElementById('stat-week').textContent = formatMinutes(0)
    document.getElementById('stat-month').textContent = formatMinutes(0)
    document.getElementById('stat-total').textContent = formatMinutes(0)
    renderXP(0)
    return fallback
  }
  if (!res.ok) throw new Error('stats load failed')
  const data = await res.json()

  document.getElementById('stat-today').textContent = formatMinutes(data.today || 0)
  document.getElementById('stat-week').textContent = formatMinutes(data.week || 0)
  document.getElementById('stat-month').textContent = formatMinutes(data.month || 0)
  document.getElementById('stat-total').textContent = formatMinutes(data.total || 0)

  renderXP(data.xp || 0)
  return data
}

async function loadRecent() {
  const res = await fetch(`${API_URL}/api/study/recent/${MY_DISCORD_ID}`)
  if (res.status === 404) {
    renderRecent([])
    return []
  }
  if (!res.ok) throw new Error('recent load failed')
  const data = await res.json()
  renderRecent(data)
  return data
}

async function ensureUserExists() {
  try {
    await fetch(`${API_URL}/api/users/upsert`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        discord_id: MY_DISCORD_ID,
        username: sessionUser.username,
        avatar: sessionUser.avatar,
        discord_avatar: sessionUser.avatar,
        avatar_mode: localStorage.getItem('study_avatar_mode') || 'discord'
      })
    })
  } catch (err) {
    console.error('ensureUserExists failed:', err)
  }
}

async function saveProfile() {
  const bio = document.getElementById('bio-input').value.trim()
  const statusText = document.getElementById('status-input').value.trim()
  const isPublic = document.getElementById('profile-public-checkbox').checked
  const avatarMode = getSelectedAvatarMode()

  setSaveStatus('儲存中...')

  const res = await fetch(`${API_URL}/api/users/${MY_DISCORD_ID}/profile`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      bio,
      status_text: statusText,
      is_profile_public: isPublic,
      avatar_mode: avatarMode
    })
  })

  if (!res.ok) {
    const errorData = await res.json().catch(() => ({}))
    throw new Error(errorData.error || 'save failed')
  }

  const latestUser = JSON.parse(localStorage.getItem('study_user') || '{}')
  latestUser.avatar_mode = avatarMode
  localStorage.setItem('study_user', JSON.stringify(latestUser))
  localStorage.setItem('study_avatar_mode', avatarMode)

  setSaveStatus('已儲存')
}

document.getElementById('bio-input').addEventListener('input', (e) => {
  const len = e.target.value.length
  document.getElementById('bio-count').textContent = `${len} / 100`
})

document.getElementById('btn-save-profile').addEventListener('click', async () => {
  try {
    await saveProfile()
  } catch (err) {
    console.error(err)
    setSaveStatus('儲存失敗，請稍後重試', true)
  }
})

async function initProfilePage() {
  try {
    await ensureUserExists()
    renderIdentityPreview()
    setSelectedAvatarMode(sessionUser.avatar_mode || localStorage.getItem('study_avatar_mode') || 'discord')
    await Promise.all([loadProfile(), loadStats(), loadRecent()])
  } catch (err) {
    console.error(err)
    setSaveStatus('載入資料失敗，請重新整理', true)
  }
}

initProfilePage()
</script>
</body>
</html>
