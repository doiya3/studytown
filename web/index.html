<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Town 🏫</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#1a1a2e; --accent:#e94560; --yellow:#f5a623; --green:#4ecdc4; --text:#eaeaea; --muted:#8892a4; --border:rgba(255,255,255,0.08); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,0.6) 0%,transparent 100%), radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,0.4) 0%,transparent 100%), radial-gradient(1px 1px at 50% 10%,rgba(255,255,255,0.5) 0%,transparent 100%), radial-gradient(1px 1px at 70% 80%,rgba(255,255,255,0.3) 0%,transparent 100%), radial-gradient(1px 1px at 90% 40%,rgba(255,255,255,0.6) 0%,transparent 100%); pointer-events:none; z-index:0; }
  #login-screen { display:none; position:fixed; inset:0; background:var(--bg); z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  #login-screen h1 { font-family:'DotGothic16',monospace; font-size:2.5rem; background:linear-gradient(135deg,var(--yellow),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  #login-screen p { color:var(--muted); font-size:0.9rem; letter-spacing:0.2em; }
  #btn-login { background:linear-gradient(135deg,#5865f2,#7289da); color:white; border:none; padding:12px 32px; border-radius:12px; font-size:1rem; cursor:pointer; font-family:'Noto Sans TC',sans-serif; font-weight:700; transition:all 0.2s; }
  #btn-login:hover { opacity:0.85; transform:translateY(-2px); }
  .container { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:32px 20px; }
  .header { text-align:center; margin-bottom:40px; }
  .header h1 { font-family:'DotGothic16',monospace; font-size:2.8rem; letter-spacing:0.1em; background:linear-gradient(135deg,var(--yellow),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
  .header .subtitle { color:var(--muted); font-size:0.9rem; letter-spacing:0.2em; text-transform:uppercase; }
  .live-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(233,69,96,0.15); border:1px solid rgba(233,69,96,0.3); border-radius:20px; padding:4px 12px; font-size:0.75rem; color:var(--accent); margin-top:10px; letter-spacing:0.1em; }
  .live-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
  .stats-bar { display:flex; justify-content:center; gap:24px; margin-bottom:36px; flex-wrap:wrap; }
  .stat-item { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:12px 24px; text-align:center; }
  .stat-num { font-family:'DotGothic16',monospace; font-size:1.6rem; color:var(--yellow); }
  .stat-label { font-size:0.75rem; color:var(--muted); margin-top:2px; letter-spacing:0.1em; }
  .map-grid { display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:auto auto; gap:16px; margin-bottom:32px; }
  .zone-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:20px; padding:24px; transition:all 0.3s ease; position:relative; overflow:hidden; }
  .zone-card::before { content:''; position:absolute; inset:0; background:var(--zone-color,rgba(255,255,255,0.02)); opacity:0; transition:opacity 0.3s ease; border-radius:20px; }
  .zone-card:hover::before { opacity:1; }
  .zone-card.has-users { border-color:var(--zone-accent,rgba(255,255,255,0.2)); box-shadow:0 0 20px var(--zone-glow,transparent); }
  .zone-library { grid-column:2; grid-row:1; --zone-color:rgba(78,205,196,0.05); --zone-accent:rgba(78,205,196,0.3); --zone-glow:rgba(78,205,196,0.1); }
  .zone-cafe { grid-column:1; grid-row:1; --zone-color:rgba(245,166,35,0.05); --zone-accent:rgba(245,166,35,0.3); --zone-glow:rgba(245,166,35,0.1); }
  .zone-night { grid-column:3; grid-row:1; --zone-color:rgba(168,218,220,0.05); --zone-accent:rgba(168,218,220,0.3); --zone-glow:rgba(168,218,220,0.1); }
  .zone-grass { grid-column:1; grid-row:2; --zone-color:rgba(100,200,100,0.05); --zone-accent:rgba(100,200,100,0.3); --zone-glow:rgba(100,200,100,0.1); }
  .zone-lake { grid-column:3; grid-row:2; --zone-color:rgba(100,150,255,0.05); --zone-accent:rgba(100,150,255,0.3); --zone-glow:rgba(100,150,255,0.1); }
  .zone-path { grid-column:2; grid-row:2; display:flex; align-items:center; justify-content:center; opacity:0.3; pointer-events:none; }
  .zone-path-inner { font-size:2rem; text-align:center; line-height:1.5; }
  .zone-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .zone-emoji { font-size:1.8rem; line-height:1; }
  .zone-info h3 { font-family:'DotGothic16',monospace; font-size:1rem; letter-spacing:0.05em; }
  .zone-info .zone-desc { font-size:0.72rem; color:var(--muted); margin-top:2px; }
  .zone-count { margin-left:auto; background:rgba(255,255,255,0.08); border-radius:20px; padding:3px 10px; font-size:0.75rem; font-family:'DotGothic16',monospace; color:var(--muted); transition:all 0.3s ease; }
  .zone-count.active { background:var(--zone-accent,rgba(255,255,255,0.15)); color:var(--text); }
  .xp-badge { display:inline-block; font-size:0.65rem; padding:2px 7px; border-radius:6px; margin-top:6px; letter-spacing:0.05em; font-weight:700; }
  .xp-badge.bonus { background:rgba(233,69,96,0.2); color:var(--accent); border:1px solid rgba(233,69,96,0.3); }
  .xp-badge.normal { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid var(--border); }
  .users-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; min-height:36px; }
  .user-chip { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:4px 10px 4px 8px; font-size:0.78rem; animation:fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .user-name { color:var(--text); max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty-zone { color:var(--muted); font-size:0.78rem; font-style:italic; display:flex; align-items:center; gap:6px; margin-top:14px; opacity:0.6; }
  .buff-notice { display:none; margin-top:10px; padding:6px 10px; background:rgba(233,69,96,0.1); border:1px solid rgba(233,69,96,0.2); border-radius:8px; font-size:0.72rem; color:var(--accent); }
  .buff-notice.show { display:block; animation:fadeIn 0.3s ease; }
  .footer { text-align:center; color:var(--muted); font-size:0.78rem; padding-top:20px; border-top:1px solid var(--border); letter-spacing:0.1em; }
  .refresh-info { display:inline-flex; align-items:center; gap:6px; margin-top:8px; font-size:0.72rem; opacity:0.7; }
  .spinner { width:10px; height:10px; border:2px solid var(--muted); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; display:none; }
  .spinner.active { display:block; }
  @keyframes spin { to{transform:rotate(360deg)} }
  @media (max-width:700px) {
    .map-grid { grid-template-columns:1fr 1fr; }
    .zone-library { grid-column:1/-1; grid-row:auto; }
    .zone-cafe,.zone-grass { grid-column:1; grid-row:auto; }
    .zone-night,.zone-lake { grid-column:2; grid-row:auto; }
    .zone-path { display:none; }
    .header h1 { font-size:2rem; }
  }
  #page-fade { position: fixed; inset: 0; background: #000; z-index: 9998; pointer-events: none; animation: pageFadeIn 0.2s ease 0.1s both; }
  @keyframes pageFadeIn { from { opacity: 1; } to { opacity: 0; } }
  /* ── 設定面板 ── */
  #settings-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:500; align-items:center; justify-content:center; }
  #settings-overlay.open { display:flex; }
  #settings-panel { background:#1a1a2e; border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:28px 24px; width:320px; max-width:90vw; box-shadow:0 8px 40px rgba(0,0,0,0.5); }
  #settings-panel h3 { font-family:'DotGothic16',monospace; font-size:1.05rem; margin-bottom:18px; color:var(--text); }
  .avatar-preview { display:flex; align-items:center; gap:14px; margin-bottom:20px; padding:12px 14px; background:rgba(255,255,255,0.04); border-radius:12px; }
  .avatar-preview img { width:44px; height:44px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); flex-shrink:0; }
  .avatar-preview .pv-emoji { width:44px; height:44px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; }
  .avatar-preview .pv-name { font-size:0.88rem; color:var(--text); }
  .avatar-preview .pv-sub { font-size:0.72rem; color:var(--muted); margin-top:3px; }
  .mode-btn { display:flex; align-items:center; gap:12px; width:100%; padding:11px 14px; margin-bottom:8px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09); border-radius:12px; color:var(--text); font-size:0.83rem; cursor:pointer; transition:all 0.2s; text-align:left; font-family:'Noto Sans TC',sans-serif; }
  .mode-btn:hover { background:rgba(255,255,255,0.08); }
  .mode-btn.active { border-color:var(--green); background:rgba(78,205,196,0.08); }
  .mode-btn.active .mode-title { color:var(--green); }
  .mode-btn .mode-icon { font-size:1.3rem; line-height:1; }
  .mode-title { font-size:0.85rem; }
  .mode-desc { font-size:0.7rem; color:var(--muted); margin-top:2px; }
  #settings-close { margin-top:4px; width:100%; padding:9px; background:transparent; border:1px solid var(--border); border-radius:10px; color:var(--muted); cursor:pointer; font-size:0.8rem; font-family:'Noto Sans TC',sans-serif; transition:background 0.2s; }
  #settings-close:hover { background:rgba(255,255,255,0.05); }
</style>
</head>
<body>
<div id="page-fade"></div>

<!-- 頭像設定面板 -->
<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div id="settings-panel">
    <h3>⚙️ 頭像設定</h3>
    <div class="avatar-preview">
      <img id="settings-avatar-img" src="" alt="" style="display:none;">
      <div class="pv-emoji" id="settings-avatar-emoji" style="display:none;"></div>
      <div>
        <div class="pv-name" id="settings-username"></div>
        <div class="pv-sub" id="settings-mode-label">模式：Discord 頭像</div>
      </div>
    </div>
    <button class="mode-btn" id="mode-discord" onclick="setAvatarMode('discord')">
      <span class="mode-icon">🖼️</span>
      <div><div class="mode-title">Discord 頭像</div><div class="mode-desc">使用您的 Discord 大頭貼</div></div>
    </button>
    <button class="mode-btn" id="mode-preset" onclick="setAvatarMode('preset')">
      <span class="mode-icon">🐱</span>
      <div><div class="mode-title">動物頭像</div><div class="mode-desc">使用可愛動物圖示</div></div>
    </button>
    <button class="mode-btn" id="mode-anonymous" onclick="setAvatarMode('anonymous')">
      <span class="mode-icon">👤</span>
      <div><div class="mode-title">匿名模式</div><div class="mode-desc">隱藏身份，顯示為「無名」</div></div>
    </button>
    <button id="settings-close" onclick="closeSettings()">關閉</button>
  </div>
</div>

<!-- 登入畫面 -->
<div id="login-screen">
  <h1>📚 Study Town</h1>
  <p>校園學習小鎮</p>
  <button id="btn-login">🎮 用 Discord 登入</button>
</div>

<!-- 地圖畫面 -->
<div id="map-screen" style="display:none;">
  <div class="container">
    <div class="header">
      <h1>📚 Study Town</h1>
      <p class="subtitle">校園學習小鎮</p>
      <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num" id="stat-online">0</div><div class="stat-label">目前在線</div></div>
      <div class="stat-item"><div class="stat-num" id="stat-studying">0</div><div class="stat-label">專注中</div></div>
      <div class="stat-item"><div class="stat-num" id="stat-players">0</div><div class="stat-label">總玩家數</div></div>
    </div>
    <div style="position:fixed; top:16px; right:20px; z-index:100; display:flex; align-items:center; gap:8px;">
      <span id="hud-username" style="color:#8892a4; font-size:0.8rem;"></span>
      <button id="btn-settings" onclick="openSettings()" style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#eaeaea; padding:4px 10px; border-radius:8px; font-size:0.75rem; cursor:pointer;">👤 身分設定</button>
      <button id="btn-logout" style="background:rgba(233,69,96,0.15); border:1px solid rgba(233,69,96,0.3); color:#e94560; padding:4px 12px; border-radius:8px; font-size:0.75rem; cursor:pointer;">登出</button>
    </div>
    <div class="map-grid">
      <div class="zone-card zone-cafe" id="zone-咖啡廳" onclick="enterZone('咖啡廳')" style="cursor:pointer;">
        <div class="zone-header"><span class="zone-emoji">☕</span><div class="zone-info"><h3>咖啡廳</h3><span class="zone-desc">輕度專注・聊天</span><div><span class="xp-badge normal">XP +0%</span></div></div><div class="zone-count" id="count-咖啡廳">0人</div></div>
        <div class="users-list" id="users-咖啡廳"></div><div class="buff-notice" id="buff-咖啡廳"></div>
      </div>
      <div class="zone-card zone-library" id="zone-圖書館" onclick="enterZone('圖書館')" style="cursor:pointer;">
        <div class="zone-header"><span class="zone-emoji">🏫</span><div class="zone-info"><h3>圖書館</h3><span class="zone-desc">專注讀書</span><div><span class="xp-badge bonus">XP +10%</span></div></div><div class="zone-count" id="count-圖書館">0人</div></div>
        <div class="users-list" id="users-圖書館"></div><div class="buff-notice" id="buff-圖書館"></div>
      </div>
      <div class="zone-card zone-night" id="zone-夜讀室" onclick="enterZone('夜讀室')" style="cursor:pointer;">
        <div class="zone-header"><span class="zone-emoji">🌙</span><div class="zone-info"><h3>夜讀室</h3><span class="zone-desc">深夜專注</span><div><span class="xp-badge bonus">22:00後 +20%</span></div></div><div class="zone-count" id="count-夜讀室">0人</div></div>
        <div class="users-list" id="users-夜讀室"></div><div class="buff-notice" id="buff-夜讀室"></div>
      </div>
      <div class="zone-card zone-grass" id="zone-草地" onclick="enterZone('草地')" style="cursor:pointer;">
        <div class="zone-header"><span class="zone-emoji">🌿</span><div class="zone-info"><h3>草地</h3><span class="zone-desc">放鬆・掛機</span><div><span class="xp-badge normal">XP +5%</span></div></div><div class="zone-count" id="count-草地">0人</div></div>
        <div class="users-list" id="users-草地"></div><div class="buff-notice" id="buff-草地"></div>
      </div>
      <div class="zone-path"><div class="zone-path-inner">🌸<br>🛤️<br>🌸</div></div>
      <div class="zone-card zone-lake" id="zone-湖邊" onclick="enterZone('湖邊')" style="cursor:pointer;">
        <div class="zone-header"><span class="zone-emoji">🎣</span><div class="zone-info"><h3>湖邊</h3><span class="zone-desc">釣魚・收集</span><div><span class="xp-badge normal">釣魚 +XP</span></div></div><div class="zone-count" id="count-湖邊">0人</div></div>
        <div class="users-list" id="users-湖邊"></div><div class="buff-notice" id="buff-湖邊"></div>
      </div>
    </div>
    <div class="footer">
      Study Town · 校園學習小鎮
      <div class="refresh-info"><div class="spinner" id="spinner"></div><span id="last-update">載入中...</span></div>
    </div>
  </div>
</div>

<script type="module">
import { loginWithDiscord, getTokenFromURL, fetchDiscordUser, saveSession, loadSession, clearSession } from './auth.js'

const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
const API_URL = IS_LOCAL ? 'http://localhost:3000' : 'https://homes-when-centers-disclaimers.trycloudflare.com'

const avatarEmoji = { cat:'🐱', dog:'🐶', bear:'🐻', rabbit:'🐰', fox:'🦊', panda:'🐼', frog:'🐸', penguin:'🐧' }
const ZONES = ['咖啡廳','圖書館','夜讀室','草地','湖邊']
const BUFF_RULES = [
  { min:5, msg:'🔥 五人聚集！XP +30%' },
  { min:3, msg:'✨ 三人同行！XP +20%' },
  { min:2, msg:'👥 一起讀書！XP +10%' },
]

let currentUser = null

async function init() {
  const token = getTokenFromURL()
  if (token) {
    const discordUser = await fetchDiscordUser(token)
    saveSession(discordUser, token)
    window.history.replaceState({}, '', window.location.pathname)
    currentUser = discordUser
  } else {
    const session = loadSession()
    if (session) currentUser = session.user
  }
  if (currentUser) {
    await fetch(`${API_URL}/api/users/upsert`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: currentUser.id, username: currentUser.username, avatar: currentUser.avatar, discord_avatar: currentUser.avatar })
    }).catch(e => console.error('upsert error:', e))
    showMap()
  } else { showLogin() }
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('map-screen').style.display = 'none'
}

function showMap() {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('map-screen').style.display = 'block'
  
  // 不在这里清除位置，避免与场景加载的并发问题
  // 清除逻辑由 cafe.html/library.html 的 tryInteract 负责
  
  fetchAndRender()
  setInterval(fetchAndRender, 10000)
}

document.getElementById('btn-login').addEventListener('click', loginWithDiscord)

async function fetchAndRender() {
  document.getElementById('spinner').classList.add('active')
  try {
    const res = await fetch(`${API_URL}/api/users/scene/all`)
    if (!res.ok) throw new Error(`HTTP ${res.status}`)
    const users = await res.json()

    const online = users.filter(u => u.current_zone && u.current_zone !== 'none').length
    const studying = users.filter(u => u.status === 'studying').length
    document.getElementById('stat-online').textContent = online
    document.getElementById('stat-studying').textContent = studying
    document.getElementById('stat-players').textContent = users.length

    ZONES.forEach(zone => {
      const zoneUsers = users.filter(u => u.current_zone === zone)
      const listEl = document.getElementById(`users-${zone}`)
      const countEl = document.getElementById(`count-${zone}`)
      const cardEl = document.getElementById(`zone-${zone}`)
      const buffEl = document.getElementById(`buff-${zone}`)

      countEl.textContent = `${zoneUsers.length}人`
      countEl.classList.toggle('active', zoneUsers.length > 0)
      cardEl.classList.toggle('has-users', zoneUsers.length > 0)

      if (zoneUsers.length === 0) {
        listEl.innerHTML = '<div class="empty-zone">🌿 空無一人</div>'
      } else {
        listEl.innerHTML = zoneUsers.map(user => {
          const avatarHtml = user.discord_avatar
            ? `<img src="https://cdn.discordapp.com/avatars/${user.discord_id}/${user.discord_avatar}.png?size=32" style="width:1.4rem;height:1.4rem;border-radius:50%;vertical-align:middle;" onerror="this.replaceWith(document.createTextNode('${avatarEmoji[user.avatar] || '🐱'}'))">`
            : `<span style="font-size:1.4rem;">${avatarEmoji[user.avatar] || '🐱'}</span>`
          return `<div class="user-chip">${avatarHtml}<span class="user-name">${user.username || '未知'}</span></div>`
        }).join('')
      }

      const buff = BUFF_RULES.find(r => zoneUsers.length >= r.min)
      if (buff) { buffEl.textContent = buff.msg; buffEl.classList.add('show') }
      else { buffEl.classList.remove('show') }
    })

    const now = new Date()
    document.getElementById('last-update').textContent = `上次更新：${now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`
  } catch (err) {
    console.error('讀取資料失敗：', err)
    document.getElementById('last-update').textContent = '讀取失敗，重試中...'
  } finally {
    document.getElementById('spinner').classList.remove('active')
  }
}
function navigateTo(url) {
  const el = document.getElementById('page-fade')
  el.style.animation = 'none'
  el.style.opacity = '0'          // ensure starting point is transparent
  void el.offsetWidth             // force reflow so transition fires
  el.style.transition = 'opacity 0.2s ease'
  el.style.pointerEvents = 'all'
  el.style.opacity = '1'          // fade to black over 0.2s
  setTimeout(() => { window.location.href = url }, 220)
}
function enterZone(zone) {
  const zonePages = {
    '圖書館': 'library.html',
    '咖啡廳': 'cafe.html',
    // 之後其他區域加在這裡
  }
  const page = zonePages[zone]
  if (page) {
    navigateTo(page)
  } else {
    alert(`${zone} 場景即將開放！`)
  }
}
document.getElementById('btn-logout').addEventListener('click', async () => {
  const session = loadSession()
  if (session?.user?.id) {
    try {
      await fetch(`${API_URL}/api/users/clear-location`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: session.user.id })
      })
    } catch (e) {
      console.error('Logout error:', e)
    }
  }
  
  // 清除所有本地數據
  clearSession()
  currentUser = null
  
  // 刷新頁面重新顯示登入畫面
  location.reload()
})
// 讓函式可以從 onclick 呼叫（module 作用域問題）
window.enterZone = enterZone

let currentAvatarMode = localStorage.getItem('study_avatar_mode') || 'discord'

function openSettings() {
  const session = loadSession()
  if (!session) return
  const user = session.user
  currentAvatarMode = localStorage.getItem('study_avatar_mode') || 'discord'
  document.getElementById('settings-username').textContent = user.username || '未知'
  const imgEl = document.getElementById('settings-avatar-img')
  const emojiEl = document.getElementById('settings-avatar-emoji')
  if (currentAvatarMode === 'anonymous') {
    imgEl.style.display = 'none'
    emojiEl.textContent = '👤'
    emojiEl.style.display = 'flex'
  } else if (user.avatar_url) {
    imgEl.src = user.avatar_url
    imgEl.style.display = ''
    emojiEl.style.display = 'none'
  } else {
    imgEl.style.display = 'none'
    emojiEl.textContent = avatarEmoji[user.avatar] || '🐱'
    emojiEl.style.display = 'flex'
  }
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'))
  document.getElementById(`mode-${currentAvatarMode}`)?.classList.add('active')
  const modeLabels = { discord: 'Discord 頭像', preset: '動物頭像', anonymous: '匿名模式' }
  document.getElementById('settings-mode-label').textContent = `模式：${modeLabels[currentAvatarMode] || currentAvatarMode}`
  document.getElementById('settings-overlay').classList.add('open')
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open')
}

async function setAvatarMode(mode) {
  currentAvatarMode = mode
  localStorage.setItem('study_avatar_mode', mode)
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'))
  document.getElementById(`mode-${mode}`)?.classList.add('active')
  const modeLabels = { discord: 'Discord 頭像', preset: '動物頭像', anonymous: '匿名模式' }
  document.getElementById('settings-mode-label').textContent = `模式：${modeLabels[mode] || mode}`
  const session = loadSession()
  if (!session) return
  await fetch(`${API_URL}/api/users/status`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ discord_id: session.user.id, avatar_mode: mode })
  }).catch(e => console.error('setAvatarMode error:', e))
}

window.openSettings = openSettings
window.closeSettings = closeSettings
window.setAvatarMode = setAvatarMode
init()
</script>
