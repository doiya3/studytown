<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 咖啡廳 — Study Town</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #1a1208;
    --bg2:        #221810;
    --panel:      rgba(34, 24, 16, 0.92);
    --border:     rgba(245, 166, 35, 0.15);
    --accent:     #f5a623;
    --accent2:    #e8961a;
    --text:       #f0e6d3;
    --text-muted: #a08060;
    --glow:       rgba(245, 166, 35, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans TC', sans-serif;
    overflow: hidden;
  }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    z-index: 100;
  }
  #hud-title { font-family: 'DotGothic16', monospace; color: var(--accent); font-size: 0.9rem; letter-spacing: 0.12em; }
  #hud-player { color: var(--text); font-size: 0.82rem; display: flex; align-items: center; gap: 8px; }
  #hud-zone { color: var(--text-muted); font-size: 0.75rem; margin-left: auto; }
  #hud-back {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted); padding: 5px 14px; border-radius: 8px; font-size: 0.76rem;
    cursor: pointer; transition: all 0.2s; text-decoration: none;
  }
  #hud-back:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: var(--border); }

  #hud-identity-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--text-muted); padding: 4px 11px; border-radius: 8px;
    font-size: 0.73rem; cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  #hud-identity-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }

  /* 身分設定面板 */
  #id-settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 600;
    align-items: center; justify-content: center;
  }
  #id-settings-overlay.open { display: flex; }
  #id-settings-panel {
    background: #1e1408; border: 1px solid rgba(245,166,35,0.25);
    border-radius: 18px; padding: 24px 20px; width: 300px; max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #id-settings-panel h3 { font-family: 'DotGothic16', monospace; font-size: 1rem; margin-bottom: 16px; color: var(--accent); }
  .id-mode-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 10px 12px; margin-bottom: 7px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 11px; color: var(--text); font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .id-mode-btn:hover { background: rgba(255,255,255,0.08); }
  .id-mode-btn.active { border-color: var(--accent); background: rgba(245,166,35,0.08); }
  .id-mode-btn.active .id-mode-title { color: var(--accent); }
  .id-mode-icon { font-size: 1.2rem; }
  .id-mode-desc { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
  #id-settings-close {
    margin-top: 4px; width: 100%; padding: 8px;
    background: transparent; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px; color: var(--text-muted); cursor: pointer;
    font-size: 0.78rem; font-family: 'Noto Sans TC', sans-serif; transition: background 0.2s;
  }
  #id-settings-close:hover { background: rgba(255,255,255,0.06); }

  #game-container { margin-top: 52px; position: relative; }
  canvas { display: block; image-rendering: pixelated; }

  #interaction-hint {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 20px; color: var(--accent);
    font-size: 0.8rem; font-family: 'DotGothic16', monospace;
    letter-spacing: 0.06em; display: none; z-index: 100;
    backdrop-filter: blur(12px); box-shadow: 0 4px 20px var(--glow);
    animation: float 2.5s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes float {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-5px); }
  }

  /* 飲料選單 */
  #drink-panel {
    position: fixed; bottom: 24px; right: 24px; width: 200px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 16px; z-index: 100; display: none;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 32px var(--glow), 0 8px 32px rgba(0,0,0,0.4);
  }
  #drink-panel.visible { display: block; animation: panelIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  #drink-panel h3 { font-family: 'DotGothic16', monospace; color: var(--accent); font-size: 0.8rem; margin-bottom: 12px; text-align: center; letter-spacing: 0.1em; }
  .drink-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .drink-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 4px; cursor: pointer; text-align: center;
    transition: all 0.2s; font-size: 0.75rem; color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
  }
  .drink-btn:hover { background: rgba(245,166,35,0.12); border-color: rgba(245,166,35,0.4); }
  .drink-btn.selected { background: rgba(245,166,35,0.2); border-color: rgba(245,166,35,0.6); color: var(--accent); }
  .drink-emoji { font-size: 1.4rem; display: block; margin-bottom: 2px; }
  #btn-order {
    width: 100%; padding: 9px; border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg);
    font-size: 0.85rem; font-family: 'Noto Sans TC', sans-serif; font-weight: 700;
    transition: all 0.2s; margin-bottom: 6px;
  }
  #btn-order:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px var(--glow); }
  #btn-close-drink {
    width: 100%; padding: 6px; border-radius: 10px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted); font-size: 0.78rem; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* 番茄鐘面板 */
  #focus-panel {
    position: fixed; bottom: 24px; right: 24px; width: 260px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 20px; z-index: 100; display: none;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 32px var(--glow), 0 8px 32px rgba(0,0,0,0.4);
  }
  #focus-panel.visible { display: block; animation: panelIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  #focus-panel h3 { font-family: 'DotGothic16', monospace; color: var(--accent); font-size: 0.82rem; letter-spacing: 0.1em; margin-bottom: 14px; text-align: center; }
  #focus-seat { text-align: center; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 10px; }
  #pomo-settings { margin-bottom: 10px; }
  .pomo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .pomo-row label { color: var(--text-muted); font-size: 0.72rem; min-width: 52px; }
  .pomo-row input { width: 44px; min-width: 0; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: var(--text); font-size: 0.78rem; padding: 3px 6px; text-align: center; font-family: 'DotGothic16', monospace; -moz-appearance: textfield; }
  .pomo-row input::-webkit-inner-spin-button, .pomo-row input::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
  .pomo-row span { color: var(--text-muted); font-size: 0.7rem; }
  .pomo-spins { display: flex; gap: 3px; margin-left: auto; }
  .pomo-spin { width: 20px; height: 20px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: #c0c8d4; font-size: 0.9rem; line-height: 1; cursor: pointer; padding: 0; transition: background 0.15s; }
  .pomo-spin:hover { background: rgba(255,255,255,0.18); color: var(--text); }
  #pomo-phase { text-align: center; font-size: 0.78rem; color: var(--accent); font-family: 'DotGothic16', monospace; margin: 6px 0 2px; }
  #pomo-dots { text-align: center; font-size: 1rem; letter-spacing: 3px; min-height: 1.2em; margin-bottom: 2px; }
  #focus-timer {
    font-family: 'DotGothic16', monospace; font-size: 2.6rem;
    color: var(--text); text-align: center; margin: 8px 0 14px;
    letter-spacing: 0.05em; text-shadow: 0 0 20px var(--glow);
  }
  #focus-timer.running { color: var(--accent); text-shadow: 0 0 24px var(--glow); }
  #focus-timer.break-mode { color: #4ecdc4; }
  #focus-timer.finished { color: #e94560; animation: pulse 1s ease-in-out infinite; text-shadow: 0 0 24px rgba(233,69,96,0.4); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  #pomo-xp-preview { text-align: center; font-size: 0.68rem; color: var(--text-muted); min-height: 1em; margin-bottom: 8px; }
  .focus-controls { display: flex; gap: 8px; }
  .ctrl-btn { flex: 1; padding: 9px 0; border-radius: 12px; border: none; cursor: pointer; font-size: 0.8rem; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; transition: all 0.2s; letter-spacing: 0.03em; }
  #btn-start { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); }
  #btn-start:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px var(--glow); }
  #btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #btn-stop { background: rgba(233,69,96,0.12); border: 1px solid rgba(233,69,96,0.25); color: #e94560; }
  #btn-stop:hover { background: rgba(233,69,96,0.2); }

  /* 私訊 UI */
  #dm-overlay { position: fixed; inset: 0; z-index: 500; display: none; }
  #dm-overlay.visible { display: block; }
  #dm-menu {
    position: fixed; background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; z-index: 501; min-width: 180px;
    backdrop-filter: blur(10px); box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  #dm-menu h4 { font-family: 'DotGothic16', monospace; color: var(--accent); font-size: 0.78rem; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  #dm-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; padding: 0; line-height: 1; }
  #dm-close:hover { color: var(--text); }
  .dm-btn { display: block; width: 100%; padding: 7px 10px; margin-bottom: 6px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06);
    color: var(--text); font-size: 0.8rem; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; text-align: left; transition: background 0.15s; }
  .dm-btn:hover { background: rgba(255,255,255,0.14); }
  #dm-input-row { display: none; margin-top: 4px; }
  #dm-input-row.visible { display: flex; gap: 6px; }
  #dm-input { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    color: var(--text); font-size: 0.8rem; padding: 5px 8px; font-family: 'Noto Sans TC', sans-serif; outline: none; }
  #dm-send { padding: 5px 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg); font-weight: 700; font-size: 0.8rem; cursor: pointer; }
  #dm-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 18px; z-index: 600; font-size: 0.82rem; color: var(--text);
    backdrop-filter: blur(10px); pointer-events: none; opacity: 0;
    transition: opacity 0.3s, transform 0.3s; max-width: 280px; text-align: center;
  }
  #dm-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #page-fade { position: fixed; inset: 0; background: #000; z-index: 9998; pointer-events: none; animation: pageFadeIn 0.2s ease 0.1s both; }
  @keyframes pageFadeIn { from { opacity: 1; } to { opacity: 0; } }

  #controls-hint {
    position: fixed; bottom: 24px; left: 24px;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px; padding: 8px 14px; font-size: 0.7rem; color: var(--text-muted); z-index: 100; line-height: 1.9; opacity: 0.7;
  }
  #player-count {
    position: fixed; top: 64px; right: 20px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 6px 14px; font-size: 0.75rem; color: var(--text-muted); z-index: 100;
    backdrop-filter: blur(12px);
  }
  #player-count span { color: var(--accent); font-family: 'DotGothic16', monospace; }
</style>
</head>
<body>

<div id="hud">
  <div id="hud-title">☕ 咖啡廳</div>
  <div id="hud-player">
    <span id="hud-avatar">🐱</span>
    <span id="hud-username"></span>
    <span id="hud-drink" style="margin-left:4px;"></span>
  </div>
  <div id="hud-zone">📍 咖啡廳</div>
  <button id="hud-identity-btn" onclick="openIdentitySettings()">👤 身分設定</button>
  <a href="index.html" id="hud-back">← 回小鎮</a>
</div>

<div id="page-fade"></div>
<!-- 身分設定面板 -->
<div id="id-settings-overlay" onclick="if(event.target===this)closeIdentitySettings()">
  <div id="id-settings-panel">
    <h3>👤 身分設定</h3>
    <button class="id-mode-btn" id="idmode-discord" onclick="setIdentityMode('discord')">
      <span class="id-mode-icon">🖼️</span>
      <div><div class="id-mode-title">Discord 頭像</div><div class="id-mode-desc">顯示您的 Discord 大頭貼</div></div>
    </button>
    <button class="id-mode-btn" id="idmode-anonymous" onclick="setIdentityMode('anonymous')">
      <span class="id-mode-icon">👤</span>
      <div><div class="id-mode-title">匿名模式</div><div class="id-mode-desc">顯示為「同學」</div></div>
    </button>
    <button id="id-settings-close" onclick="closeIdentitySettings()">關閉</button>
  </div>
</div>
<div id="game-container"></div>
<div id="interaction-hint">按 E 互動</div>

<!-- 飲料選單 -->
<div id="drink-panel">
  <h3>☕ 點一杯吧！</h3>
  <div class="drink-grid">
    <button class="drink-btn" data-drink="☕" data-name="拿鐵">
      <span class="drink-emoji">☕</span>拿鐵
    </button>
    <button class="drink-btn" data-drink="🧋" data-name="珍奶">
      <span class="drink-emoji">🧋</span>珍奶
    </button>
    <button class="drink-btn" data-drink="🍵" data-name="抹茶">
      <span class="drink-emoji">🍵</span>抹茶
    </button>
    <button class="drink-btn" data-drink="🧃" data-name="果汁">
      <span class="drink-emoji">🧃</span>果汁
    </button>
    <button class="drink-btn" data-drink="🍫" data-name="可可">
      <span class="drink-emoji">🍫</span>可可
    </button>
    <button class="drink-btn" data-drink="🥤" data-name="汽水">
      <span class="drink-emoji">🥤</span>汽水
    </button>
  </div>
  <button id="btn-order">點餐 ✓</button>
  <button id="btn-close-drink">取消</button>
</div>

<!-- 番茄鐘面板 -->
<div id="focus-panel">
  <h3>☕ 輕鬆專注</h3>
  <div id="focus-seat">座位 #1</div>
  <div id="pomo-settings">
    <div class="pomo-row"><label>學習</label><input type="number" id="pomo-work" value="25" min="1" max="120"><span>分鐘</span><div class="pomo-spins"><button class="pomo-spin" onclick="adjPomo('pomo-work',-1)">−</button><button class="pomo-spin" onclick="adjPomo('pomo-work',1)">+</button></div></div>
    <div class="pomo-row"><label>短休息</label><input type="number" id="pomo-break" value="5" min="1" max="60"><span>分鐘</span><div class="pomo-spins"><button class="pomo-spin" onclick="adjPomo('pomo-break',-1)">−</button><button class="pomo-spin" onclick="adjPomo('pomo-break',1)">+</button></div></div>
    <div class="pomo-row"><label>長休息</label><input type="number" id="pomo-long-break" value="15" min="1" max="60"><span>分鐘</span><div class="pomo-spins"><button class="pomo-spin" onclick="adjPomo('pomo-long-break',-1)">−</button><button class="pomo-spin" onclick="adjPomo('pomo-long-break',1)">+</button></div></div>
    <div class="pomo-row"><label>每幾輪</label><input type="number" id="pomo-long-after" value="4" min="1" max="10"><span>輪長休</span><div class="pomo-spins"><button class="pomo-spin" onclick="adjPomo('pomo-long-after',-1)">−</button><button class="pomo-spin" onclick="adjPomo('pomo-long-after',1)">+</button></div></div>
    <div class="pomo-row"><label>目標</label><input type="number" id="pomo-rounds" value="4" min="1" max="20"><span>輪</span><div class="pomo-spins"><button class="pomo-spin" onclick="adjPomo('pomo-rounds',-1)">−</button><button class="pomo-spin" onclick="adjPomo('pomo-rounds',1)">+</button></div></div>
  </div>
  <div id="pomo-phase">準備開始</div>
  <div id="pomo-dots"></div>
  <div id="focus-timer">25:00</div>
  <div id="pomo-xp-preview"></div>
  <div class="focus-controls">
    <button class="ctrl-btn" id="btn-start">開始</button>
    <button class="ctrl-btn" id="btn-stop">離開</button>
  </div>
</div>

<div id="controls-hint">WASD 移動<br>E 互動<br>點擊地板移動</div>
<div id="player-count">咖啡廳：<span id="online-count">1</span> 人</div>

<div id="dm-overlay">
  <div id="dm-menu">
    <h4><span id="dm-target-name">玩家</span><button id="dm-close">✕</button></h4>
    <button class="dm-btn" id="dm-btn-wave">👋 打招呼</button>
    <button class="dm-btn" id="dm-btn-msg">💬 傳訊息</button>
    <div id="dm-input-row">
      <input id="dm-input" type="text" placeholder="輸入訊息..." maxlength="60">
      <button id="dm-send">送</button>
    </div>
  </div>
</div>
<div id="dm-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
const API_URL = IS_LOCAL ? 'http://localhost:3000' : 'https://homes-when-centers-disclaimers.trycloudflare.com'
const WS_URL  = IS_LOCAL ? 'ws://localhost:3000'  : 'wss://homes-when-centers-disclaimers.trycloudflare.com'

const sessionRaw = localStorage.getItem('study_user')
const sessionUser = sessionRaw ? JSON.parse(sessionRaw) : null
if (!sessionUser) {
  console.error('❌ sessionUser not found in localStorage')
  window.location.href = 'index.html'
}

const MY_DISCORD_ID = sessionUser?.id
const MY_USERNAME = sessionUser?.username
const MY_AVATAR_URL = sessionUser?.avatar_url || null
const MY_AVATAR_MODE = localStorage.getItem('study_avatar_mode') || 'discord'

const DISPLAY_NAME = MY_AVATAR_MODE === 'anonymous' ? '同學' : MY_USERNAME
const DISPLAY_AVATAR_URL = MY_AVATAR_MODE === 'discord' ? MY_AVATAR_URL : null

if (!MY_DISCORD_ID) {
  console.error('❌ MY_DISCORD_ID is missing:', sessionUser)
  window.location.href = 'index.html'
}
console.log('✓ User logged in:', { MY_DISCORD_ID, MY_USERNAME })

function navigateTo(url) {
  const el = document.getElementById('page-fade')
  el.style.animation = 'none'
  el.style.opacity = '0'          // ensure starting point is transparent
  void el.offsetWidth             // force reflow so transition fires
  el.style.transition = 'opacity 0.2s ease'
  el.style.pointerEvents = 'all'
  el.style.opacity = '1'          // fade to black over 0.2s
  setTimeout(() => { window.location.href = url }, 220)
}

let ws = null
function initWebSocket(scene) {
  ws = new WebSocket(WS_URL)
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', discord_id: MY_DISCORD_ID, scene: '咖啡廳' }))
    // 重連後立即廣播目前位置，避免靜止玩家在他人視野消失
    if (scene.playerGx !== undefined) {
      ws.send(JSON.stringify({ type: 'move', x: scene.playerGx, y: scene.playerGy, username: DISPLAY_NAME, avatar_url: DISPLAY_AVATAR_URL }))
    }
    console.log('[WS] 已連線')
  }
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data)
    if (msg.type === 'player_move') scene.onPlayerMove(msg)
    if (msg.type === 'player_leave') scene.onPlayerLeave(msg.discord_id)
    if (msg.type === 'broadcast') {
      if (msg.action === 'wave') showToast(`${msg.fromName || msg.from} 對你揮手 👋`)
      else if (msg.action === 'message') showToast(`${msg.fromName || msg.from}: ${msg.text}`)
    }
  }
  ws.onclose = () => {
    if (isExiting) return
    console.log('[WS] 斷線，3秒後重連')
    setTimeout(() => initWebSocket(scene), 3000)
  }
}

const TILE = 48
const COLS = 16
const ROWS = 12
const W = TILE * COLS
const H = TILE * ROWS

const COLORS = {
  floor:       0x523a25,
  floor2:      0x4a3220,
  wall:        0x2a1a0a,
  counter:     0x6b4a2a,
  counterTop:  0x8b6a3a,
  sofa:        0x8b3a2a,
  sofaLight:   0xaa5a3a,
  table:       0x5c3a1e,
  chair:       0x7c5a3a,
  window:      0x6ca0dc,
  door:        0x8b7355,
  plant:       0x2d5a2d,
  playerSelf:  0xf5a623,
  playerOther: 0x4ecdc4,
  lamp:        0xf5e642,
}

// 座位（沙發區＋桌椅區）
const SEATS = [
  // 沙發區（左側）
  { id: 1, x: 3, y: 5 },
  { id: 2, x: 3, y: 7 },
  { id: 3, x: 5, y: 5 },
  { id: 4, x: 5, y: 7 },
  // 桌椅區（右側）
  { id: 5, x: 9,  y: 5 },
  { id: 6, x: 11, y: 5 },
  { id: 7, x: 9,  y: 8 },
  { id: 8, x: 11, y: 8 },
]

// 吧台位置
const COUNTER_Y = 2
const COUNTER_INTERACT_Y = 3

const BLOCKED = new Set()
function blockRect(x, y, w, h) {
  for (let i = x; i < x + w; i++)
    for (let j = y; j < y + h; j++)
      BLOCKED.add(`${i},${j}`)
}

blockRect(0, 0, 16, 1)   // 上牆
blockRect(0, 0, 1, 12)   // 左牆
blockRect(15, 0, 1, 12)  // 右牆
blockRect(1, 1, 14, 2)   // 吧台
// 沙發桌子
for (const seat of SEATS) {
  if (seat.id <= 4) BLOCKED.add(`${seat.x + 1},${seat.y}`) // 沙發旁小桌
}

function isBlocked(gx, gy) {
  return BLOCKED.has(`${gx},${gy}`) || gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS
}

let myDrink = null;
let drinkBubbles = {};
let isExiting = false;

// 非同步載入並裁切成圓形的 Discord 頭像 Phaser 紋理
function loadAvatarTexture(scene, key, url, callback) {
  if (!url) { callback(false); return }
  if (scene.textures.exists(key)) { callback(true); return }
  const img = new Image()
  img.crossOrigin = 'anonymous'
  img.onload = () => {
    const size = 28
    const canvas = document.createElement('canvas')
    canvas.width = size; canvas.height = size
    const ctx = canvas.getContext('2d')
    ctx.beginPath()
    ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2)
    ctx.closePath()
    ctx.clip()
    ctx.drawImage(img, 0, 0, size, size)
    scene.textures.addCanvas(key, canvas)
    callback(true)
  }
  img.onerror = () => callback(false)
  img.src = url
}

class CafeScene extends Phaser.Scene {
  constructor() {
    super('Cafe');
    this.player = null;
    this.playerGx = 8;
    this.playerGy = 10;
    this.otherPlayers = {};
    this.otherTargets = {};
    this.playerLabels = {};
    this.drinkLabels = {};
    this.nearSeat = null;
    this.nearCounter = false;
    this.nearDoor = false;
    this.seated = false;
    this.currentSeat = null;
    this.moveTarget = null;
    this.graphics = null;
    this.moveTimer = 0;
    this.moveDelay = 150;
    this.syncTimer = 0;
    this.otherGrids = {};     // 其他玩家的格子位置
    this.otherAvatars = {};    // 其他玩家頭像 Image 物件
    this.playerAvatarImg = null; // 自己的頭像 Image 物件
    this.bumpCooldown = false; // 碰撞特效冷卻
  }

  create() {
    this.graphics = this.add.graphics();
    this.drawMap();

    this.player = this.add.graphics();
    this.drawPlayer(this.player, COLORS.playerSelf);
    this.updatePlayerPos();

    // 自己的 Discord 頭像（圓形）
    loadAvatarTexture(this, `avatar_${MY_DISCORD_ID}`, MY_AVATAR_URL, (ok) => {
      if (!ok) return
      this.playerAvatarImg = this.add.image(
        this.playerGx * TILE + TILE / 2,
        this.playerGy * TILE + TILE / 2 - 2,
        `avatar_${MY_DISCORD_ID}`
      ).setDisplaySize(26, 26).setDepth(1)
    })

    this.playerLabel = this.add.text(0, 0, DISPLAY_NAME, {
      fontSize: '10px', fontFamily: 'Noto Sans TC',
      color: '#f5a623', stroke: '#1a1208', strokeThickness: 3,
    }).setOrigin(0.5, 1);

    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.W,
      down: Phaser.Input.Keyboard.KeyCodes.S,
      left: Phaser.Input.Keyboard.KeyCodes.A,
      right: Phaser.Input.Keyboard.KeyCodes.D,
      interact: Phaser.Input.Keyboard.KeyCodes.E,
    });

    this.input.on('pointerdown', (pointer) => {
      if (this.seated) return;
      if (this.input.hitTestPointer(pointer).length > 0) return;
      const gx = Math.floor(pointer.x / TILE);
      const gy = Math.floor(pointer.y / TILE);
      if (!isBlocked(gx, gy)) this.moveTarget = { x: gx, y: gy };
    });

    this.moveTimer = 0;
    this.moveDelay = 150;
    this.syncTimer = 0;

    try {
      this.updateZone().catch(e => console.error('updateZone error:', e));
      this.loadOtherPlayers().catch(e => console.error('loadOtherPlayers error:', e));
    } catch (e) {
      console.error('Initialization error:', e);
    }

    // WebSocket 即時同步（onPlayerMove 會自動處理後進入的玩家）
    initWebSocket(this)
  }

  drawMap() {
    const g = this.graphics

    // 地板
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        const color = (x + y) % 2 === 0 ? COLORS.floor : COLORS.floor2
        g.fillStyle(color)
        g.fillRect(x * TILE, y * TILE, TILE, TILE)
      }
    }

    // 牆壁
    g.fillStyle(COLORS.wall)
    g.fillRect(0, 0, W, TILE)
    g.fillRect(0, 0, TILE, H)
    g.fillRect(15 * TILE, 0, TILE, H)

    // 吧台
    for (let x = 1; x < 15; x++) {
      g.fillStyle(COLORS.counter)
      g.fillRect(x * TILE, TILE, TILE, TILE * 1.5)
      g.fillStyle(COLORS.counterTop)
      g.fillRect(x * TILE + 2, TILE + 2, TILE - 4, 10)
    }

    // 吧台上的裝飾（咖啡機、杯子）
    g.fillStyle(0x4a4a4a)
    g.fillRect(3 * TILE + 4, TILE + 4, 20, 20) // 咖啡機
    g.fillStyle(0xffffff)
    g.fillRect(3 * TILE + 8, TILE + 8, 12, 12)
    g.fillStyle(0x8b6a3a)
    g.fillRect(6 * TILE + 4, TILE + 8, 8, 14)  // 杯子
    g.fillRect(8 * TILE + 4, TILE + 8, 8, 14)
    g.fillRect(10 * TILE + 4, TILE + 8, 8, 14)

    // 窗戶
    g.fillStyle(COLORS.window)
    g.fillRect(5 * TILE + 4, 4, TILE * 2 - 8, 8)
    g.fillRect(10 * TILE + 4, 4, TILE * 2 - 8, 8)

    // 沙發區（左側）
    const sofaSeats = SEATS.filter(s => s.id <= 4)
    for (const seat of sofaSeats) {
      // 沙發
      g.fillStyle(COLORS.sofa)
      g.fillRect(seat.x * TILE + 2, seat.y * TILE + 2, TILE - 4, TILE - 4)
      g.fillStyle(COLORS.sofaLight)
      g.fillRect(seat.x * TILE + 6, seat.y * TILE + 6, TILE - 12, TILE - 20)
      // 小桌
      g.fillStyle(COLORS.table)
      g.fillRect((seat.x + 1) * TILE + 6, seat.y * TILE + 6, TILE - 12, TILE - 12)
      // 飲料裝飾
      g.fillStyle(0x8b6a3a)
      g.fillRect((seat.x + 1) * TILE + 14, seat.y * TILE + 14, 8, 10)
    }

    // 桌椅區（右側）
    const tableSeats = SEATS.filter(s => s.id > 4)
    for (const seat of tableSeats) {
      // 桌子
      g.fillStyle(COLORS.table)
      g.fillRect(seat.x * TILE + 2, (seat.y - 1) * TILE + 2, TILE - 4, TILE - 4)
      g.fillStyle(0x8b6a3a)
      g.fillRect(seat.x * TILE + 8, (seat.y - 1) * TILE + 8, 20, 14)
      // 椅子
      g.fillStyle(COLORS.chair)
      g.fillRect(seat.x * TILE + 6, seat.y * TILE + 6, TILE - 12, TILE - 12)
    }

    // 植物裝飾
    g.fillStyle(COLORS.plant)
    g.fillCircle(2 * TILE - 8, 4 * TILE, 16)
    g.fillCircle(14 * TILE + 8, 4 * TILE, 16)
    g.fillStyle(0x3d2b1a)
    g.fillRect(2 * TILE - 14, 4 * TILE + 8, 12, 16)
    g.fillRect(14 * TILE + 2, 4 * TILE + 8, 12, 16)

    // 燈光
    for (const seat of SEATS) {
      g.fillStyle(COLORS.lamp, 0.05)
      g.fillCircle(seat.x * TILE + TILE / 2, seat.y * TILE, TILE * 1.5)
    }

    // 門
    g.fillStyle(COLORS.door)
    g.fillRect(7 * TILE + 4, 11 * TILE, TILE * 2 - 8, TILE)
    g.fillStyle(0xc9a87c)
    g.fillRect(8 * TILE, 11 * TILE + 4, TILE - 4, TILE - 8)

    // 格線
    g.lineStyle(1, 0xffffff, 0.02)
    for (let x = 0; x <= COLS; x++) g.lineBetween(x * TILE, 0, x * TILE, H)
    for (let y = 0; y <= ROWS; y++) g.lineBetween(0, y * TILE, W, y * TILE)
  }

  drawPlayer(g, color) {
    g.clear();
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(TILE / 2, TILE - 6, TILE - 10, 8);
    g.fillStyle(color, 0.9);
    g.fillCircle(TILE / 2, TILE / 2 - 2, 14);
    g.fillStyle(0xffffff, 0.3);
    g.fillCircle(TILE / 2 - 4, TILE / 2 - 6, 5);
  }

  updatePlayerPos() {
    const px = this.playerGx * TILE;
    const py = this.playerGy * TILE;
    this.player.setPosition(px, py);
    if (this.playerAvatarImg) {
      this.playerAvatarImg.setPosition(px + TILE / 2, py + TILE / 2 - 2);
    }
    if (this.playerLabel) this.playerLabel.setPosition(px + TILE / 2, py - 2);
  }

  update(time, delta) {
    // 其他玩家插値移動（不管自己是否坐下都要跟）
    Object.entries(this.otherTargets).forEach(([id, target]) => {
      const sprite = this.otherPlayers[id]
      if (!sprite) return
      sprite.x += (target.x - sprite.x) * 0.3
      sprite.y += (target.y - sprite.y) * 0.3
      const label = this.playerLabels[id]
      if (label) {
        label.x += (target.x + TILE / 2 - label.x) * 0.3
        label.y += (target.y - 2 - label.y) * 0.3
      }
      const av = this.otherAvatars[id]
      if (av) {
        av.x += (target.x + TILE / 2 - av.x) * 0.3
        av.y += (target.y + TILE / 2 - 2 - av.y) * 0.3
      }
    })

    if (this.seated) return;

    this.moveTimer += delta;
    if (this.moveTimer >= this.moveDelay) {
      let moved = false;
      let nx = this.playerGx;
      let ny = this.playerGy;

      if (this.cursors.left.isDown || this.wasd.left.isDown) { nx--; moved = true }
      else if (this.cursors.right.isDown || this.wasd.right.isDown) { nx++; moved = true }
      else if (this.cursors.up.isDown || this.wasd.up.isDown) { ny--; moved = true }
      else if (this.cursors.down.isDown || this.wasd.down.isDown) { ny++; moved = true }

      if (!moved && this.moveTarget) {
        const dx = this.moveTarget.x - this.playerGx
        const dy = this.moveTarget.y - this.playerGy
        if (Math.abs(dx) > 0 || Math.abs(dy) > 0) {
          if (Math.abs(dx) >= Math.abs(dy)) nx = this.playerGx + Math.sign(dx)
          else ny = this.playerGy + Math.sign(dy)
          moved = true
          if (nx === this.moveTarget.x && ny === this.moveTarget.y) this.moveTarget = null
        } else { this.moveTarget = null }
      }

      if (moved) {
        const blockedByPlayer = Object.values(this.otherGrids).some(g => g.x === nx && g.y === ny)
        if (!isBlocked(nx, ny) && !blockedByPlayer) {
          this.playerGx = nx;
          this.playerGy = ny;
          this.updatePlayerPos();
          this.moveTimer = 0;
          // 走一格立即透過 WebSocket 推送
          if (!isExiting && ws?.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'move', x: this.playerGx, y: this.playerGy, username: DISPLAY_NAME, avatar_url: DISPLAY_AVATAR_URL }))
          }
        } else if (blockedByPlayer && !this.bumpCooldown) {
          // 碰撞特效：縮放 + 閃爍
          this.bumpCooldown = true;
          this.tweens.add({
            targets: this.player,
            scaleX: 1.25,
            scaleY: 1.25,
            alpha: 0.4,
            duration: 80,
            yoyo: true,
            ease: 'Power2',
            onComplete: () => {
              this.player.setScale(1);
              this.player.setAlpha(1);
              this.bumpCooldown = false;
            }
          });
        }
      }
    }


    if (Phaser.Input.Keyboard.JustDown(this.wasd.interact)) this.tryInteract()

    this.checkNearby()

    // 同步位置（心跳，每5秒補漏）
    this.syncTimer += delta;
    if (this.syncTimer > 5000) {
      this.syncTimer = 0;
      if (!isExiting) {
        fetch(`${API_URL}/api/users/location`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ discord_id: MY_DISCORD_ID, map_x: this.playerGx, map_y: this.playerGy, map_scene: '咖啡廳' })
        }).catch(e => console.error('heartbeat error:', e))
        // WS 心跳：確保靜止玩家持續出現在他人視野
        if (ws?.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'move', x: this.playerGx, y: this.playerGy, username: DISPLAY_NAME, avatar_url: DISPLAY_AVATAR_URL }))
        }
      }
    }
  }

  checkNearby() {
    const hint = document.getElementById('interaction-hint')

    // 門口
    const atDoor = this.playerGy >= 10 && this.playerGx >= 7 && this.playerGx <= 9
    if (atDoor) {
      hint.textContent = '按 E 返回小鎮'
      hint.style.display = 'block'
      this.nearDoor = true
      this.nearCounter = false
      this.nearSeat = null
      return
    }
    this.nearDoor = false

    // 吧台
    const atCounter = this.playerGy === COUNTER_INTERACT_Y && this.playerGx >= 2 && this.playerGx <= 13
    if (atCounter) {
      hint.textContent = '按 E 點一杯飲料'
      hint.style.display = 'block'
      this.nearCounter = true
      this.nearSeat = null
      return
    }
    this.nearCounter = false

    // 座位
    let found = null
    for (const seat of SEATS) {
      const dx = Math.abs(this.playerGx - seat.x)
      const dy = Math.abs(this.playerGy - seat.y)
      if (dx <= 1 && dy <= 1) { found = seat; break }
    }

    if (found !== this.nearSeat) {
      this.nearSeat = found
      const hint = document.getElementById('interaction-hint')

      if (found && !this.seated) {
        fetch(`${API_URL}/api/users/scene/咖啡廳`)
          .then(r => r.json())
          .then(users => {
            if (this.nearSeat?.id !== found.id) return
            const occupied = Array.isArray(users) && users.some(u => u.seat_id === found.id && u.discord_id !== MY_DISCORD_ID)
            if (occupied) {
              hint.textContent = `🚫 座位 #${found.id} 已有人`
              hint.style.display = 'block'
              this.seatOccupied = true
            } else {
              hint.textContent = `按 E 坐下休息（座位 #${found.id}）`
              hint.style.display = 'block'
              this.seatOccupied = false
            }
          })
      } else if (!this.seated) {
        hint.style.display = 'none'
        this.seatOccupied = false
      }
    }
  }

  async tryInteract() {
    if (this.nearDoor) {
      clearInterval(pomo.interval);
      isExiting = true;
      if (ws) ws.close()
      try {
        await fetch(`${API_URL}/api/users/clear-location`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ discord_id: MY_DISCORD_ID })
        });
      } catch (e) {
        console.error('Clear location error:', e);
      }
      navigateTo('index.html');
      return;
    }
    if (this.nearCounter) {
      document.getElementById('drink-panel').classList.add('visible')
      return
    }
    if (this.nearSeat && !this.seated) {
      // 即時檢查座位
      const usersRes = await fetch(`${API_URL}/api/users/scene/咖啡廳`)
      const usersData = await usersRes.json()
      const occupied = Array.isArray(usersData) && usersData.some(u => u.seat_id === this.nearSeat.id && u.discord_id !== MY_DISCORD_ID)

      if (occupied) {
        document.getElementById('interaction-hint').textContent = `🚫 座位 #${this.nearSeat.id} 已有人`
        return
      }
      this.sitDown(this.nearSeat)
    }
  }

  async sitDown(seat) {
    this.seated = true;
    this.currentSeat = seat;
    pomo.seatId = seat.id;
    this.playerGx = seat.x;
    this.playerGy = seat.y;
    this.updatePlayerPos();
    // 廣播坐下位置給其他玩家
    if (!isExiting && ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'move', x: seat.x, y: seat.y, username: DISPLAY_NAME, avatar_url: DISPLAY_AVATAR_URL }))
    }
    this.tweens.add({ targets: this.player, scaleX: 0.85, scaleY: 0.85, duration: 200, ease: 'Power2' });
    document.getElementById('interaction-hint').style.display = 'none';
    document.getElementById('focus-seat').textContent = `座位 #${seat.id}`;
    document.getElementById('focus-panel').classList.add('visible');

    // 坐下：同步位置，但狀態為 browsing（尚未開始計時）
    await Promise.all([
      fetch(`${API_URL}/api/users/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, seat_id: seat.id, status: 'browsing', current_zone: '咖啡廳' })
      }),
      fetch(`${API_URL}/api/users/location`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, map_x: seat.x, map_y: seat.y, map_scene: '咖啡廳' })
      })
    ]);
  }

  async standUp() {
    this.seated = false;
    this.currentSeat = null;
    pomo.seatId = null;
    if (!isExiting && ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'move', x: this.playerGx, y: this.playerGy, username: DISPLAY_NAME, avatar_url: DISPLAY_AVATAR_URL }))
    }
    this.tweens.add({ targets: this.player, scaleX: 1, scaleY: 1, duration: 200, ease: 'Power2' });
    document.getElementById('focus-panel').classList.remove('visible');

    // 清除座位並等待完成
    await fetch(`${API_URL}/api/users/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, seat_id: null, status: 'browsing' })
    });
    
    // 重新檢查附近座位（強制刷新顯示）
    this.nearSeat = null;
    this.checkNearby();
  }

  async updateZone() {
    await Promise.all([
      fetch(`${API_URL}/api/users/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'browsing', current_zone: '咖啡廳' })
      }),
      fetch(`${API_URL}/api/users/location`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, map_x: this.playerGx, map_y: this.playerGy, map_scene: '咖啡廳' })
      })
    ])
  }

  async loadOtherPlayers() {
    const res = await fetch(`${API_URL}/api/users/scene/咖啡廳`)
    const allUsers = await res.json()
    const users = Array.isArray(allUsers) ? allUsers.filter(u => u.discord_id !== MY_DISCORD_ID) : null

    Object.values(this.otherPlayers).forEach(p => p.destroy())
    Object.values(this.playerLabels).forEach(l => l.destroy())
    this.otherPlayers = {}
    this.playerLabels = {};
    this.otherTargets = {};
    this.otherGrids = {};

    document.getElementById('online-count').textContent = (users?.length || 0) + 1;
    if (!users) return;

    users.forEach(user => {
      const gx = user.map_x || 8
      const gy = user.map_y || 10
      const isAnon = user.avatar_mode === 'anonymous'
      const displayName = isAnon ? '同學' : user.username
      const g = this.add.graphics()
      g.fillStyle(COLORS.playerOther, 0.8)
      g.fillCircle(TILE / 2, TILE / 2 - 2, 12)
      g.setPosition(gx * TILE, gy * TILE)
      g.setInteractive(new Phaser.Geom.Circle(TILE/2, TILE/2-2, 14), Phaser.Geom.Circle.Contains)
      g.on('pointerdown', (ptr) => openDmMenu(user.discord_id, displayName, ptr.x, ptr.y))
      g.on('pointerover', () => { this.input.setDefaultCursor('pointer') })
      g.on('pointerout',  () => { this.input.setDefaultCursor('default') })
      this.otherPlayers[user.discord_id] = g
      this.otherTargets[user.discord_id] = { x: gx * TILE, y: gy * TILE }
      this.otherGrids[user.discord_id] = { x: gx, y: gy }

      const label = this.add.text(gx * TILE + TILE / 2, gy * TILE - 2, displayName, {
        fontSize: '10px', fontFamily: 'Noto Sans TC',
        color: '#ffffff', stroke: '#1a1208', strokeThickness: 3
      }).setOrigin(0.5, 1);
      this.playerLabels[user.discord_id] = label;

      // 載入頭像（匿名模式不顯示 Discord 頭像）
      const avatarKey = `avatar_${user.discord_id}`
      const avatarUrl = (!isAnon && user.discord_avatar)
        ? `https://cdn.discordapp.com/avatars/${user.discord_id}/${user.discord_avatar}.png?size=64`
        : null
      loadAvatarTexture(this, avatarKey, avatarUrl, (ok) => {
        if (!ok || !this.otherPlayers[user.discord_id]) return
        const sp = this.otherPlayers[user.discord_id]
        const av = this.add.image(sp.x + TILE / 2, sp.y + TILE / 2 - 2, avatarKey).setDisplaySize(26, 26).setDepth(1)
        this.otherAvatars[user.discord_id] = av
      })
    })
  }

  onPlayerMove(msg) {
    const { discord_id, x, y, username, avatar_url } = msg
    const gx = x || 8
    const gy = y || 10
    const displayName = username || discord_id

    if (this.otherPlayers[discord_id]) {
      this.otherTargets[discord_id] = { x: gx * TILE, y: gy * TILE }
      this.otherGrids[discord_id] = { x: gx, y: gy }
    } else {
      const g = this.add.graphics()
      g.fillStyle(COLORS.playerOther, 0.8)
      g.fillCircle(TILE / 2, TILE / 2 - 2, 12)
      g.setPosition(gx * TILE, gy * TILE)
      g.setInteractive(new Phaser.Geom.Circle(TILE/2, TILE/2-2, 14), Phaser.Geom.Circle.Contains)
      g.on('pointerdown', (ptr) => openDmMenu(discord_id, displayName, ptr.x, ptr.y))
      g.on('pointerover', () => { this.input.setDefaultCursor('pointer') })
      g.on('pointerout',  () => { this.input.setDefaultCursor('default') })
      this.otherPlayers[discord_id] = g
      this.otherTargets[discord_id] = { x: gx * TILE, y: gy * TILE }
      this.otherGrids[discord_id] = { x: gx, y: gy }

      const label = this.add.text(gx * TILE + TILE / 2, gy * TILE - 2, displayName, {
        fontSize: '10px', fontFamily: 'Noto Sans TC',
        color: '#ffffff', stroke: '#1a1208', strokeThickness: 3
      }).setOrigin(0.5, 1);
      this.playerLabels[discord_id] = label;

      // 載入頭像
      if (avatar_url) {
        const avatarKey = `avatar_${discord_id}`
        loadAvatarTexture(this, avatarKey, avatar_url, (ok) => {
          if (!ok || !this.otherPlayers[discord_id]) return
          const sp = this.otherPlayers[discord_id]
          const av = this.add.image(sp.x + TILE / 2, sp.y + TILE / 2 - 2, avatarKey).setDisplaySize(26, 26).setDepth(1)
          this.otherAvatars[discord_id] = av
        })
      }
    }

    document.getElementById('online-count').textContent = Object.keys(this.otherPlayers).length + 1;
    this.nearSeat = null;
  }

  onPlayerLeave(discord_id) {
    if (this.otherPlayers[discord_id]) {
      this.otherPlayers[discord_id].destroy()
      this.playerLabels[discord_id]?.destroy()
      this.otherAvatars[discord_id]?.destroy()
      delete this.otherPlayers[discord_id]
      delete this.playerLabels[discord_id]
      delete this.otherTargets[discord_id]
      delete this.otherGrids[discord_id]
      delete this.otherAvatars[discord_id]
    }
    document.getElementById('online-count').textContent = Object.keys(this.otherPlayers).length + 1;
    this.nearSeat = null;
  }
}

const config = {
  type: Phaser.CANVAS, width: W, height: H,

  scene: CafeScene, pixelArt: true, antialias: false,

// ─── 私訊 ────────────────────────────────────────────────
let toastTimer = null
function showToast(msg) {
  const t = document.getElementById('dm-toast')
  t.textContent = msg
  t.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500)
}

let dmTarget = { id: null, name: '' }
const dmMenu = document.getElementById('dm-menu')
const dmOverlay = document.getElementById('dm-overlay')

function openDmMenu(targetId, targetName, px, py) {
  dmTarget = { id: targetId, name: targetName }
  document.getElementById('dm-target-name').textContent = targetName
  document.getElementById('dm-input-row').classList.remove('visible')
  document.getElementById('dm-input').value = ''
  // 將選單定位到场景點擊位置，防止超出番幕
  const W = window.innerWidth, H = window.innerHeight
  const mw = 200, mh = 110
  dmMenu.style.left = Math.min(px + 8, W - mw - 8) + 'px'
  dmMenu.style.top  = Math.min(py + 8, H - mh - 8) + 'px'
  dmOverlay.classList.add('visible')
}

dmOverlay.addEventListener('click', (e) => {
  if (e.target === dmOverlay) {
    dmOverlay.classList.remove('visible')
  }
})

document.getElementById('dm-close').addEventListener('click', () => {
  dmOverlay.classList.remove('visible')
})

document.getElementById('dm-btn-wave').addEventListener('click', () => {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'broadcast', to: dmTarget.id, action: 'wave', fromName: DISPLAY_NAME }))
  }
  showToast(`已對 ${dmTarget.name} 揮手 👋`)
  dmOverlay.classList.remove('visible')
})

document.getElementById('dm-btn-msg').addEventListener('click', () => {
  document.getElementById('dm-input-row').classList.add('visible')
  document.getElementById('dm-input').focus()
})

function sendDM() {
  const msg = document.getElementById('dm-input').value.trim()
  if (!msg) return
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'broadcast', to: dmTarget.id, action: 'message', text: msg, fromName: DISPLAY_NAME }))
  }
  showToast(`對 ${dmTarget.name}: ${msg}`)
  dmOverlay.classList.remove('visible')
}

document.getElementById('dm-send').addEventListener('click', sendDM)
document.getElementById('dm-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendDM() })

// ─── 番茄鐘 ────────────────────────────────────────
const pomo = {
  workMin: 25, breakMin: 5, longBreakMin: 15,
  longAfter: 4, targetRounds: 4,
  round: 0, phase: 'idle',
  remainSec: 0, sessionStart: null, sessionId: null, seatId: null, interval: null, running: false,
}

function formatTime(sec) {
  return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`
}

function readPomoSettings() {
  pomo.workMin      = Math.max(1, parseInt(document.getElementById('pomo-work').value) || 25)
  pomo.breakMin     = Math.max(1, parseInt(document.getElementById('pomo-break').value) || 5)
  pomo.longBreakMin = Math.max(1, parseInt(document.getElementById('pomo-long-break').value) || 15)
  pomo.longAfter    = Math.max(1, parseInt(document.getElementById('pomo-long-after').value) || 4)
  pomo.targetRounds = Math.max(1, parseInt(document.getElementById('pomo-rounds').value) || 4)
}

function updatePomoDots() {
  document.getElementById('pomo-dots').innerHTML =
    Array.from({length: pomo.targetRounds}, (_, i) => {
      if (i < pomo.round) return '🍅'
      if (i === pomo.round && pomo.phase === 'work') return '⏳'
      return '○'
    }).join('')
}

function updatePomoPhase() {
  const labels = { idle:'準備開始', work:'🍅 學習中', break:'☕ 短休息', longbreak:'🌙 長休息' }
  document.getElementById('pomo-phase').textContent = labels[pomo.phase] || ''
  const t = document.getElementById('focus-timer')
  if (pomo.phase === 'work') t.className = 'running'
  else if (pomo.phase === 'break' || pomo.phase === 'longbreak') t.className = 'break-mode'
  else t.className = ''
}

function updateXpPreview() {
  const el = document.getElementById('pomo-xp-preview')
  if (pomo.phase === 'work' && pomo.sessionStart) {
    const elapsed = Math.floor((Date.now() - pomo.sessionStart) / 60000)
    el.textContent = `已計 ${elapsed} 分 · 暫得 ${elapsed * 2} XP`
  } else if (pomo.phase === 'idle') {
    el.textContent = `完成1輪可得 ${(pomo.workMin * 2) + 20} XP`
  } else {
    el.textContent = ''
  }
}

function startPomoCountdown(seconds, onComplete) {
  clearInterval(pomo.interval)
  pomo.remainSec = seconds
  document.getElementById('focus-timer').textContent = formatTime(pomo.remainSec)
  pomo.interval = setInterval(() => {
    pomo.remainSec--
    document.getElementById('focus-timer').textContent = formatTime(pomo.remainSec)
    if (pomo.phase === 'work') updateXpPreview()
    if (pomo.remainSec <= 0) { clearInterval(pomo.interval); onComplete() }
  }, 1000)
}

function adjPomo(id, delta) {
  const el = document.getElementById(id)
  const min = parseInt(el.min) || 1
  const max = parseInt(el.max) || 999
  el.value = Math.min(max, Math.max(min, (parseInt(el.value) || 0) + delta))
}

async function pomoStartWorkPhase() {
  pomo.phase = 'work'
  pomo.running = true
  pomo.sessionStart = new Date()
  document.getElementById('pomo-settings').style.display = 'none'
  document.getElementById('btn-start').textContent = '進行中...'
  document.getElementById('btn-start').disabled = true
  updatePomoPhase()
  updatePomoDots()
  const [sessionRes] = await Promise.all([
    fetch(`${API_URL}/api/study/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, zone: '咖啡廳', seat_id: pomo.seatId })
    }),
    fetch(`${API_URL}/api/users/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'studying' })
    })
  ])
  const sessionData = await sessionRes.json()
  pomo.sessionId = sessionData.id
  startPomoCountdown(pomo.workMin * 60, pomoOnWorkComplete)
}

async function pomoOnWorkComplete() {
  pomo.round++
  await pomoSaveSession(true)
  updatePomoDots()
  if (pomo.round >= pomo.targetRounds) { await pomoFinishAll(); return }
  if (pomo.round % pomo.longAfter === 0) pomoStartBreak('longbreak', pomo.longBreakMin)
  else pomoStartBreak('break', pomo.breakMin)
}

function pomoStartBreak(type, minutes) {
  pomo.phase = type
  updatePomoPhase()
  updatePomoDots()
  updateXpPreview()
  startPomoCountdown(minutes * 60, pomoStartWorkPhase)
}

async function pomoFinishAll() {
  pomo.phase = 'idle'
  pomo.running = false
  const doneRounds = pomo.round
  pomo.round = 0
  document.getElementById('focus-timer').textContent = '🎉 完成！'
  document.getElementById('focus-timer').className = 'finished'
  document.getElementById('pomo-phase').textContent = `全 ${doneRounds} 輪完成！`
  document.getElementById('pomo-dots').innerHTML = '🍅'.repeat(doneRounds)
  document.getElementById('pomo-xp-preview').textContent = ''
  document.getElementById('pomo-settings').style.display = 'block'
  document.getElementById('btn-start').textContent = '再來一輪'
  document.getElementById('btn-start').disabled = false
}

async function pomoSaveSession(completed) {
  if (!pomo.sessionId) return
  try {
    await fetch(`${API_URL}/api/study/end`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, session_id: pomo.sessionId })
    })
  } catch (e) {
    console.error('pomoSaveSession error:', e)
  }
  pomo.sessionId = null
  await fetch(`${API_URL}/api/users/status`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'browsing' })
  }).catch(e => console.error('status update error:', e))
}

document.getElementById('btn-start').addEventListener('click', async () => {
  if (pomo.running) return
  readPomoSettings()
  pomo.round = 0
  updatePomoDots()
  updateXpPreview()
  await pomoStartWorkPhase()
})

document.getElementById('btn-stop').addEventListener('click', async () => {
  clearInterval(pomo.interval)
  const wasInWork = pomo.phase === 'work' && pomo.sessionStart
  // 先結算再重設，避免 sessionStart 被清掉
  if (wasInWork) await pomoSaveSession(false)
  pomo.phase = 'idle'
  pomo.running = false
  pomo.round = 0
  pomo.sessionStart = null
  const workMin = parseInt(document.getElementById('pomo-work').value) || 25
  document.getElementById('focus-timer').textContent = formatTime(workMin * 60)
  document.getElementById('focus-timer').className = ''
  document.getElementById('pomo-phase').textContent = '準備開始'
  document.getElementById('pomo-dots').innerHTML = ''
  document.getElementById('pomo-xp-preview').textContent = ''
  document.getElementById('pomo-settings').style.display = 'block'
  document.getElementById('btn-start').textContent = '開始'
  document.getElementById('btn-start').disabled = false
  if (!wasInWork) {
    await fetch(`${API_URL}/api/users/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'browsing' })
    })
  }
  await game.scene.getScene('Cafe').standUp()
})
