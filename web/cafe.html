<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ 咖啡廳 — Study Town</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #1a1208;
    --bg2:        #221810;
    --panel:      rgba(34, 24, 16, 0.92);
    --border:     rgba(245, 166, 35, 0.15);
    --accent:     #f5a623;
    --accent2:    #e8961a;
    --text:       #f0e6d3;
    --text-muted: #a08060;
    --glow:       rgba(245, 166, 35, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { max-width: 100%; overflow-x: hidden; }
  body {
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Noto Sans TC', sans-serif;
    overflow: hidden;
  }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
    z-index: 100;
  }
  #hud-title { font-family: 'DotGothic16', monospace; color: var(--accent); font-size: 0.9rem; letter-spacing: 0.12em; }
  #hud-player { color: var(--text); font-size: 0.82rem; display: flex; align-items: center; gap: 8px; }
  #hud-zone { color: var(--text-muted); font-size: 0.75rem; margin-left: auto; }
  #hud-back {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted); padding: 5px 14px; border-radius: 8px; font-size: 0.76rem;
    cursor: pointer; transition: all 0.2s; text-decoration: none;
  }
  #hud-back:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: var(--border); }

  #hud-profile {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--text-muted); padding: 4px 11px; border-radius: 8px;
    font-size: 0.73rem; cursor: pointer; transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  #hud-profile:hover { background: rgba(255,255,255,0.12); color: var(--text); }

  /* 身分設定面板 */
  #id-settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 600;
    align-items: center; justify-content: center;
  }
  #id-settings-overlay.open { display: flex; }
  #id-settings-panel {
    background: #1e1408; border: 1px solid rgba(245,166,35,0.25);
    border-radius: 18px; padding: 24px 20px; width: 300px; max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #id-settings-panel h3 { font-family: 'DotGothic16', monospace; font-size: 1rem; margin-bottom: 16px; color: var(--accent); }
  .id-mode-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 10px 12px; margin-bottom: 7px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 11px; color: var(--text); font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; text-align: left;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .id-mode-btn:hover { background: rgba(255,255,255,0.08); }
  .id-mode-btn.active { border-color: var(--accent); background: rgba(245,166,35,0.08); }
  .id-mode-btn.active .id-mode-title { color: var(--accent); }
  .id-mode-icon { font-size: 1.2rem; }
  .id-mode-desc { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
  #id-settings-close {
    margin-top: 4px; width: 100%; padding: 8px;
    background: transparent; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px; color: var(--text-muted); cursor: pointer;
    font-size: 0.78rem; font-family: 'Noto Sans TC', sans-serif; transition: background 0.2s;
  }
  #id-settings-close:hover { background: rgba(255,255,255,0.06); }

  #game-container { margin-top: 52px; position: relative; }
  canvas { display: block; image-rendering: pixelated; }

  #interaction-hint {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 20px; color: var(--accent);
    font-size: 0.8rem; font-family: 'DotGothic16', monospace;
    letter-spacing: 0.06em; display: none; z-index: 100;
    backdrop-filter: blur(12px); box-shadow: 0 4px 20px var(--glow);
    animation: float 2.5s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes float {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-5px); }
  }

  /* 飲料選單 */
  #drink-panel {
    position: fixed; bottom: 24px; right: 24px; width: 200px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 16px; z-index: 100; display: none;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 32px var(--glow), 0 8px 32px rgba(0,0,0,0.4);
  }
  #drink-panel.visible { display: block; animation: panelIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  #drink-panel h3 { font-family: 'DotGothic16', monospace; color: var(--accent); font-size: 0.8rem; margin-bottom: 12px; text-align: center; letter-spacing: 0.1em; }
  .drink-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .drink-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 4px; cursor: pointer; text-align: center;
    transition: all 0.2s; font-size: 0.75rem; color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
  }
  .drink-btn:hover { background: rgba(245,166,35,0.12); border-color: rgba(245,166,35,0.4); }
  .drink-btn.selected { background: rgba(245,166,35,0.2); border-color: rgba(245,166,35,0.6); color: var(--accent); }
  .drink-emoji { font-size: 1.4rem; display: block; margin-bottom: 2px; }
  #btn-order {
    width: 100%; padding: 9px; border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg);
    font-size: 0.85rem; font-family: 'Noto Sans TC', sans-serif; font-weight: 700;
    transition: all 0.2s; margin-bottom: 6px;
  }
  #btn-order:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px var(--glow); }
  #btn-close-drink {
    width: 100%; padding: 6px; border-radius: 10px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted); font-size: 0.78rem; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* 番茄鐘面板 */
  #focus-panel {
    position: fixed; bottom: 24px; right: 24px; width: 260px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 20px; z-index: 100; display: none;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 32px var(--glow), 0 8px 32px rgba(0,0,0,0.4);
  }
  #focus-panel.visible { display: block; animation: panelIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  #focus-panel h3 { font-family: 'DotGothic16', monospace; color: var(--accent); font-size: 0.82rem; letter-spacing: 0.1em; margin-bottom: 14px; text-align: center; }
  #focus-seat { text-align: center; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 10px; }
  #pomo-settings { margin-bottom: 10px; }
  .pomo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .pomo-row label { color: var(--text-muted); font-size: 0.72rem; min-width: 52px; }
  .pomo-row input { width: 44px; min-width: 0; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: var(--text); font-size: 0.78rem; padding: 3px 6px; text-align: center; font-family: 'DotGothic16', monospace; -moz-appearance: textfield; appearance: textfield; }
  .pomo-row input::-webkit-inner-spin-button, .pomo-row input::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
  .pomo-row span { color: var(--text-muted); font-size: 0.7rem; }
  .pomo-spins { display: flex; gap: 3px; margin-left: auto; }
  .pomo-spin { width: 20px; height: 20px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: #c0c8d4; font-size: 0.9rem; line-height: 1; cursor: pointer; padding: 0; transition: background 0.15s; }
  .pomo-spin:hover { background: rgba(255,255,255,0.18); color: var(--text); }
  #pomo-phase { text-align: center; font-size: 0.78rem; color: var(--accent); font-family: 'DotGothic16', monospace; margin: 6px 0 2px; }
  #pomo-dots { text-align: center; font-size: 1rem; letter-spacing: 3px; min-height: 1.2em; margin-bottom: 2px; }
  #focus-timer {
    font-family: 'DotGothic16', monospace; font-size: 2.6rem;
    color: var(--text); text-align: center; margin: 8px 0 14px;
    letter-spacing: 0.05em; text-shadow: 0 0 20px var(--glow);
  }
  #focus-timer.running { color: var(--accent); text-shadow: 0 0 24px var(--glow); }
  #focus-timer.break-mode { color: #4ecdc4; }
  #focus-timer.finished { color: #e94560; animation: pulse 1s ease-in-out infinite; text-shadow: 0 0 24px rgba(233,69,96,0.4); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  #pomo-xp-preview { text-align: center; font-size: 0.68rem; color: var(--text-muted); min-height: 1em; margin-bottom: 8px; }
  .focus-controls { display: flex; gap: 8px; }
  .ctrl-btn { flex: 1; padding: 9px 0; border-radius: 12px; border: none; cursor: pointer; font-size: 0.8rem; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; transition: all 0.2s; letter-spacing: 0.03em; }
  #btn-start { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); }
  #btn-start:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px var(--glow); }
  #btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #btn-stop { background: rgba(233,69,96,0.12); border: 1px solid rgba(233,69,96,0.25); color: #e94560; }
  #btn-stop:hover { background: rgba(233,69,96,0.2); }

  /* 私訊 UI */
  /* 互動選單 */
  #interaction-menu {
    position: fixed;
    background: rgba(20, 20, 30, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 12px 8px;
    min-width: 160px;
    z-index: 500;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: menuIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes menuIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }
  #interaction-menu .menu-title {
    font-size: 0.72rem; color: #8b949e; text-align: center;
    padding: 0 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 4px; font-family: 'Noto Sans TC', sans-serif;
  }
  #interaction-menu .menu-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 10px 14px; background: transparent; border: none;
    border-radius: 10px; color: #e6edf3; font-size: 0.82rem;
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
    transition: background 0.15s; text-align: left;
  }
  #interaction-menu .menu-btn:hover { background: rgba(255,255,255,0.08); }
  #interaction-menu .menu-btn .btn-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
  #interaction-menu .menu-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: #8b949e;
    font-size: 0.85rem; cursor: pointer; padding: 2px 6px;
    border-radius: 6px; transition: all 0.15s;
  }
  #interaction-menu .menu-close:hover { background: rgba(255,255,255,0.08); color: #e6edf3; }
  #dm-input-row { display: none; margin: 4px 8px 0; }
  #dm-input-row.visible { display: flex; gap: 6px; }
  #dm-input { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    color: var(--text); font-size: 0.8rem; padding: 5px 8px; font-family: 'Noto Sans TC', sans-serif; outline: none; }
  #dm-send { padding: 5px 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg); font-weight: 700; font-size: 0.8rem; cursor: pointer; }
  /* 組隊 Toast */
  #team-invite-toast {
    position: fixed; top: 70px; right: 20px;
    background: rgba(20,20,30,0.95); border: 1px solid rgba(100,200,150,0.3);
    border-radius: 14px; padding: 14px 18px; color: #e6edf3;
    font-size: 0.82rem; font-family: 'Noto Sans TC', sans-serif;
    z-index: 300; backdrop-filter: blur(16px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    display: none; align-items: center; gap: 10px;
    animation: slideInRight 0.3s ease;
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  #team-invite-toast.visible { display: flex; }
  #btn-accept-invite {
    background: rgba(48,200,120,0.2); border: 1px solid rgba(48,200,120,0.4);
    color: #30c878; padding: 4px 12px; border-radius: 8px;
    font-size: 0.78rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  }
  #btn-reject-invite {
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    color: #8b949e; padding: 4px 12px; border-radius: 8px;
    font-size: 0.78rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  }
  /* 隊伍面板 */
  #team-panel {
    position: fixed; left: 20px; top: 70px; width: 220px;
    background: rgba(20,20,30,0.92); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 14px; z-index: 100;
    backdrop-filter: blur(16px);
    display: none; flex-direction: column; gap: 10px;
    box-sizing: border-box;
    overflow: hidden;
  }
  #team-panel.visible { display: flex; }
  #team-header { font-family: 'DotGothic16', monospace; color: #30c878; font-size: 0.8rem; letter-spacing: 0.1em; }
  #teammates-list { display: flex; flex-direction: column; gap: 8px; }
  .teammate-card {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    background: rgba(255,255,255,0.04); border-radius: 12px;
  }
  .teammate-avatar {
    width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .teammate-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .teammate-info { min-width: 0; flex: 1; }
  .teammate-name { color: #e6edf3; font-size: 0.82rem; font-weight: 700; }
  .teammate-location { color: #8b949e; font-size: 0.72rem; margin-top: 2px; }
  .teammate-status { color: #f5a623; font-size: 0.72rem; margin-top: 2px; }
  #team-chat { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  #team-messages {
    max-height: 100px; overflow-y: auto; overflow-x: hidden; font-size: 0.75rem;
    padding: 4px 0; display: flex; flex-direction: column; gap: 6px;
    width: 100%; min-width: 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #team-messages::-webkit-scrollbar { display: none; }
  #team-input-row { position: relative; display: block; width: 100%; }
  #team-input {
    flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 6px 42px 6px 10px; color: #e6edf3;
    font-size: 0.75rem; font-family: 'Noto Sans TC', sans-serif; outline: none;
    width: 100%; box-sizing: border-box;
  }
  #btn-team-send {
    background: rgba(48,200,120,0.15); border: 1px solid rgba(48,200,120,0.3);
    color: #30c878; border-radius: 8px; padding: 0;
    font-size: 0.8rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
    white-space: nowrap; flex-shrink: 0;
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  }
  #btn-disband {
    background: transparent; border: 1px solid rgba(233,69,96,0.2);
    color: rgba(233,69,96,0.6); border-radius: 10px; padding: 6px;
    font-size: 0.72rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s;
  }
  #btn-disband:hover { border-color: rgba(233,69,96,0.5); color: #e94560; }

  #dm-toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 18px; z-index: 600; font-size: 0.82rem; color: var(--text);
    backdrop-filter: blur(10px); pointer-events: none; opacity: 0;
    transition: opacity 0.3s, transform 0.3s; max-width: 280px; text-align: center;
  }
  #dm-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .modal-box {
    background: #161b22;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px;
    width: 360px;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .modal-box-sm { width: 300px; }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: #8b949e;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .modal-close:hover {
    background: rgba(255,255,255,0.08);
    color: #e6edf3;
  }
  .profile-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .profile-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(48,200,120,0.3);
    object-fit: cover;
    flex-shrink: 0;
  }
  .profile-name {
    font-size: 1rem;
    font-weight: 700;
    color: #e6edf3;
    margin-bottom: 4px;
  }
  .display-name-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .display-name-text {
    font-size: 0.95rem;
    font-weight: 700;
    color: #e6edf3;
  }
  .edit-name-btn {
    background: none;
    border: none;
    font-size: 0.75rem;
    cursor: pointer;
    opacity: 0.5;
    padding: 0;
    color: #e6edf3;
    transition: opacity 0.2s;
  }
  .edit-name-btn:hover { opacity: 1; }
  .display-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(48,200,120,0.5);
    color: #e6edf3;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    width: 140px;
    outline: none;
    padding: 2px 0;
    display: none;
  }
  .status-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 4px 10px;
    color: #8b949e;
    font-size: 0.75rem;
    font-family: 'Noto Sans TC', sans-serif;
    width: 100%;
    outline: none;
    margin-bottom: 6px;
  }
  .status-input:focus {
    border-color: rgba(48,200,120,0.3);
    color: #e6edf3;
  }
  .level-badge {
    display: inline-block;
    background: rgba(48,200,120,0.15);
    border: 1px solid rgba(48,200,120,0.3);
    color: #30c878;
    font-size: 0.72rem;
    padding: 2px 10px;
    border-radius: 20px;
    font-family: 'DotGothic16', monospace;
  }
  .xp-section { margin-bottom: 16px; }
  .xp-label-row {
    display: flex;

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
const API_URL = IS_LOCAL ? 'http://localhost:3000' : 'https://verification-difference-doctor-tournament.trycloudflare.com'
const WS_URL  = IS_LOCAL ? 'ws://localhost:3000'  : 'wss://verification-difference-doctor-tournament.trycloudflare.com'

const sessionRaw = localStorage.getItem('study_user')
const sessionUser = sessionRaw ? JSON.parse(sessionRaw) : null
if (!sessionUser) {
  console.error('❌ sessionUser not found in localStorage')
  window.location.href = 'index.html'
}

const MY_DISCORD_ID = sessionUser?.id
const MY_USERNAME = sessionUser?.username
const MY_AVATAR_URL = sessionUser?.avatar_url || null
let MY_AVATAR_MODE = localStorage.getItem('study_avatar_mode') || 'discord'
let MY_DISPLAY_NAME = (sessionUser?.display_name || '').trim().slice(0, 20)

function getDisplayName(user) {
  if (user?.avatar_mode === 'anonymous') return '同學'
  if (user?.avatar_mode === 'custom') return (user?.display_name || '').trim() || '未命名'
  return user?.username || '未知玩家'
}

function getAvatarURLForMode(mode, discordUrl = MY_AVATAR_URL) {
  if (mode === 'anonymous') return null
  if (mode === 'custom') return 'assets/avatars/default.svg'
  return discordUrl || null
}

let DISPLAY_NAME = getDisplayName({ username: MY_USERNAME, display_name: MY_DISPLAY_NAME, avatar_mode: MY_AVATAR_MODE })
let DISPLAY_AVATAR_URL = getAvatarURLForMode(MY_AVATAR_MODE, MY_AVATAR_URL)

if (!MY_DISCORD_ID) {
  console.error('❌ MY_DISCORD_ID is missing:', sessionUser)
  window.location.href = 'index.html'
}
console.log('✓ User logged in:', { MY_DISCORD_ID, MY_USERNAME })

function navigateTo(url) {
  const el = document.getElementById('page-fade')
  el.style.animation = 'none'
  el.style.opacity = '0'          // ensure starting point is transparent
  void el.offsetWidth             // force reflow so transition fires
  el.style.transition = 'opacity 0.2s ease'
  el.style.pointerEvents = 'all'
  el.style.opacity = '1'          // fade to black over 0.2s
  setTimeout(() => { window.location.href = url }, 220)
}

let ws = null
function initWebSocket(scene) {
  ws = new WebSocket(WS_URL)
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', discord_id: MY_DISCORD_ID, scene: '咖啡廳' }))
    // 重連後立即廣播目前位置，避免靜止玩家在他人視野消失
    if (scene.playerGx !== undefined) {
      ws.send(JSON.stringify({ type: 'move', x: scene.playerGx, y: scene.playerGy, username: DISPLAY_NAME, display_name: MY_DISPLAY_NAME, avatar_mode: MY_AVATAR_MODE, avatar_url: DISPLAY_AVATAR_URL }))
    }
    console.log('[WS] 已連線')
  }
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data)
    if (msg.type === 'player_move') scene.onPlayerMove(msg)
    if (msg.type === 'player_leave') scene.onPlayerLeave(msg.discord_id)
    if (msg.type === 'broadcast') {
      if (msg.action === 'wave') showToast(`${msg.fromName || msg.from} 對你揮手 👋`)
      else if (msg.action === 'message') showToast(`${msg.fromName || msg.from}: ${msg.text}`)
    }
    handleTeamWsMessage(msg)
  }
  ws.onclose = () => {
    if (isExiting) return
    console.log('[WS] 斷線，3秒後重連')
    setTimeout(() => initWebSocket(scene), 3000)
  }
}

const TILE = 48
const COLS = 16
const ROWS = 12
const W = TILE * COLS
const H = TILE * ROWS

const COLORS = {
  floor:       0x523a25,
  floor2:      0x4a3220,
  wall:        0x2a1a0a,
  counter:     0x6b4a2a,
  counterTop:  0x8b6a3a,
  sofa:        0x8b3a2a,
  sofaLight:   0xaa5a3a,
  table:       0x5c3a1e,
  chair:       0x7c5a3a,
  window:      0x6ca0dc,
  door:        0x8b7355,
  plant:       0x2d5a2d,
  playerSelf:  0x30c878,
  playerOther: 0x7c8cf8,
  playerAnon:  0x4a5568,
  playerTeam:  0xf5a623,
  lamp:        0xf5e642,
}

// 座位（沙發區＋桌椅區）
const SEATS = [
  // 沙發區（左側）
  { id: 1, x: 3, y: 5 },
  { id: 2, x: 3, y: 7 },
  { id: 3, x: 5, y: 5 },
  { id: 4, x: 5, y: 7 },
  // 桌椅區（右側）
  { id: 5, x: 9,  y: 5 },
  { id: 6, x: 11, y: 5 },
  { id: 7, x: 9,  y: 8 },
  { id: 8, x: 11, y: 8 },
]

// 吧台位置
const COUNTER_Y = 2
const COUNTER_INTERACT_Y = 3

const BLOCKED = new Set()
function blockRect(x, y, w, h) {
  for (let i = x; i < x + w; i++)
    for (let j = y; j < y + h; j++)
      BLOCKED.add(`${i},${j}`)
}

blockRect(0, 0, 16, 1)   // 上牆
blockRect(0, 0, 1, 12)   // 左牆
blockRect(15, 0, 1, 12)  // 右牆
blockRect(1, 1, 14, 2)   // 吧台
// 沙發桌子
for (const seat of SEATS) {
  if (seat.id <= 4) BLOCKED.add(`${seat.x + 1},${seat.y}`) // 沙發旁小桌
}

function isBlocked(gx, gy) {
  return BLOCKED.has(`${gx},${gy}`) || gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS
}

let myDrink = null;
let drinkBubbles = {};
let isExiting = false;

function isTextInputActive() {
  const active = document.activeElement
  return active?.id === 'team-input' || active?.id === 'dm-input'
}

function blurActiveTextInput(target) {
  if (!isTextInputActive()) return
  if (target && (target.closest('#team-input-row') || target.closest('#dm-input-row'))) return
  document.activeElement?.blur()
}

// 非同步載入並裁切成圓形的 Discord 頭像 Phaser 紋理
function loadAvatarTexture(scene, key, url, callback) {
  if (!url) { callback(false); return }
  if (scene.textures.exists(key)) { callback(true); return }
  const img = new Image()
  img.crossOrigin = 'anonymous'
  img.onload = () => {
    const size = 28
    const canvas = document.createElement('canvas')
    canvas.width = size; canvas.height = size
    const ctx = canvas.getContext('2d')
    ctx.beginPath()
    ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2)
    ctx.closePath()
    ctx.clip()
    ctx.drawImage(img, 0, 0, size, size)
    scene.textures.addCanvas(key, canvas)
    callback(true)
  }
  img.onerror = () => callback(false)
  img.src = url
}

class CafeScene extends Phaser.Scene {
  constructor() {
    super('Cafe');
    this.player = null;
    this.playerGx = 8;
    this.playerGy = 10;
    this.otherPlayers = {};
    this.otherTargets = {};
    this.playerLabels = {};
    this.drinkLabels = {};
    this.nearSeat = null;
    this.nearCounter = false;
    this.nearDoor = false;
    this.seated = false;
    this.currentSeat = null;
    this.moveTarget = null;
    this.graphics = null;
    this.moveTimer = 0;
    this.moveDelay = 150;
    this.syncTimer = 0;
    this.otherGrids = {};     // 其他玩家的格子位置
    this.otherAvatars = {};    // 其他玩家頭像 Image 物件
    this.playerAvatarImg = null; // 自己的頭像 Image 物件
    this.bumpCooldown = false; // 碰撞特效冷卻
  }

  create() {
    this.graphics = this.add.graphics();
    this.drawMap();

    this.player = this.add.graphics();
    this.drawPlayer(this.player, COLORS.playerSelf);
    this.updatePlayerPos();

    // 自己的 Discord 頭像（圓形）
    loadAvatarTexture(this, `avatar_${MY_DISCORD_ID}`, MY_AVATAR_URL, (ok) => {
      if (!ok) return
      this.playerAvatarImg = this.add.image(
        this.playerGx * TILE + TILE / 2,
        this.playerGy * TILE + TILE / 2 - 2,
        `avatar_${MY_DISCORD_ID}`
      ).setDisplaySize(26, 26).setDepth(1)
    })

    this.playerLabel = this.add.text(0, 0, DISPLAY_NAME, {
      fontSize: '10px', fontFamily: 'Noto Sans TC',
      color: '#f5a623', stroke: '#1a1208', strokeThickness: 3,
    }).setOrigin(0.5, 1);

    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.W,
      down: Phaser.Input.Keyboard.KeyCodes.S,
      left: Phaser.Input.Keyboard.KeyCodes.A,
      right: Phaser.Input.Keyboard.KeyCodes.D,
      interact: Phaser.Input.Keyboard.KeyCodes.E,
    });

    this.input.on('pointerdown', (pointer) => {
      blurActiveTextInput(pointer.event?.target)
      if (isTextInputActive()) return;
      if (this.seated) return;
      if (this.input.hitTestPointer(pointer).length > 0) return;
      const gx = Math.floor(pointer.x / TILE);
      const gy = Math.floor(pointer.y / TILE);
      if (!isBlocked(gx, gy)) this.moveTarget = { x: gx, y: gy };
    });

    this.moveTimer = 0;
    this.moveDelay = 150;
    this.syncTimer = 0;

    try {
      this.updateZone().catch(e => console.error('updateZone error:', e));
      this.loadOtherPlayers().catch(e => console.error('loadOtherPlayers error:', e));
    } catch (e) {
      console.error('Initialization error:', e);
    }

    // WebSocket 即時同步（onPlayerMove 會自動處理後進入的玩家）
    initWebSocket(this)
  }

  drawMap() {
    const g = this.graphics

    // 地板
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        const color = (x + y) % 2 === 0 ? COLORS.floor : COLORS.floor2
        g.fillStyle(color)
        g.fillRect(x * TILE, y * TILE, TILE, TILE)
      }
    }

    // 牆壁
    g.fillStyle(COLORS.wall)
    g.fillRect(0, 0, W, TILE)
    g.fillRect(0, 0, TILE, H)
    g.fillRect(15 * TILE, 0, TILE, H)

    // 吧台
    for (let x = 1; x < 15; x++) {
      g.fillStyle(COLORS.counter)
      g.fillRect(x * TILE, TILE, TILE, TILE * 1.5)
      g.fillStyle(COLORS.counterTop)
      g.fillRect(x * TILE + 2, TILE + 2, TILE - 4, 10)
    }

    // 吧台上的裝飾（咖啡機、杯子）
    g.fillStyle(0x4a4a4a)
    g.fillRect(3 * TILE + 4, TILE + 4, 20, 20) // 咖啡機
    g.fillStyle(0xffffff)
    g.fillRect(3 * TILE + 8, TILE + 8, 12, 12)
    g.fillStyle(0x8b6a3a)
    g.fillRect(6 * TILE + 4, TILE + 8, 8, 14)  // 杯子
    g.fillRect(8 * TILE + 4, TILE + 8, 8, 14)
    g.fillRect(10 * TILE + 4, TILE + 8, 8, 14)

    // 窗戶
    g.fillStyle(COLORS.window)
    g.fillRect(5 * TILE + 4, 4, TILE * 2 - 8, 8)
    g.fillRect(10 * TILE + 4, 4, TILE * 2 - 8, 8)

    // 沙發區（左側）
    const sofaSeats = SEATS.filter(s => s.id <= 4)
    for (const seat of sofaSeats) {
      // 沙發
      g.fillStyle(COLORS.sofa)
      g.fillRect(seat.x * TILE + 2, seat.y * TILE + 2, TILE - 4, TILE - 4)
      g.fillStyle(COLORS.sofaLight)
      g.fillRect(seat.x * TILE + 6, seat.y * TILE + 6, TILE - 12, TILE - 20)
      // 小桌
      g.fillStyle(COLORS.table)
      g.fillRect((seat.x + 1) * TILE + 6, seat.y * TILE + 6, TILE - 12, TILE - 12)
      // 飲料裝飾
      g.fillStyle(0x8b6a3a)
      g.fillRect((seat.x + 1) * TILE + 14, seat.y * TILE + 14, 8, 10)
    }

    // 桌椅區（右側）
    const tableSeats = SEATS.filter(s => s.id > 4)
    for (const seat of tableSeats) {
      // 桌子
      g.fillStyle(COLORS.table)
      g.fillRect(seat.x * TILE + 2, (seat.y - 1) * TILE + 2, TILE - 4, TILE - 4)
      g.fillStyle(0x8b6a3a)
      g.fillRect(seat.x * TILE + 8, (seat.y - 1) * TILE + 8, 20, 14)
      // 椅子
      g.fillStyle(COLORS.chair)
      g.fillRect(seat.x * TILE + 6, seat.y * TILE + 6, TILE - 12, TILE - 12)
    }

    // 植物裝飾
    g.fillStyle(COLORS.plant)
    g.fillCircle(2 * TILE - 8, 4 * TILE, 16)
    g.fillCircle(14 * TILE + 8, 4 * TILE, 16)
    g.fillStyle(0x3d2b1a)
    g.fillRect(2 * TILE - 14, 4 * TILE + 8, 12, 16)
    g.fillRect(14 * TILE + 2, 4 * TILE + 8, 12, 16)

    // 燈光
    for (const seat of SEATS) {
      g.fillStyle(COLORS.lamp, 0.05)
      g.fillCircle(seat.x * TILE + TILE / 2, seat.y * TILE, TILE * 1.5)
    }

    // 門
    g.fillStyle(COLORS.door)
    g.fillRect(7 * TILE + 4, 11 * TILE, TILE * 2 - 8, TILE)
    g.fillStyle(0xc9a87c)
    g.fillRect(8 * TILE, 11 * TILE + 4, TILE - 4, TILE - 8)

    // 格線
    g.lineStyle(1, 0xffffff, 0.02)
    for (let x = 0; x <= COLS; x++) g.lineBetween(x * TILE, 0, x * TILE, H)
    for (let y = 0; y <= ROWS; y++) g.lineBetween(0, y * TILE, W, y * TILE)
  }

  drawPlayer(g, color) {
    g.clear();
    g.fillStyle(0x000000, 0.3);
    g.fillEllipse(TILE / 2, TILE - 6, TILE - 10, 8);
    g.fillStyle(color, 0.9);
    g.fillCircle(TILE / 2, TILE / 2 - 2, 14);
    g.fillStyle(0xffffff, 0.3);
    g.fillCircle(TILE / 2 - 4, TILE / 2 - 6, 5);
  }

  updatePlayerPos() {
    const px = this.playerGx * TILE;
    const py = this.playerGy * TILE;
    this.player.setPosition(px, py);
    if (this.playerAvatarImg) {
      this.playerAvatarImg.setPosition(px + TILE / 2, py + TILE / 2 - 2);
    }
    if (this.playerLabel) this.playerLabel.setPosition(px + TILE / 2, py - 2);
  }

  update(time, delta) {
    // 其他玩家插値移動（不管自己是否坐下都要跟）
    Object.entries(this.otherTargets).forEach(([id, target]) => {
      const sprite = this.otherPlayers[id]
      if (!sprite) return
      sprite.x += (target.x - sprite.x) * 0.3
      sprite.y += (target.y - sprite.y) * 0.3
      const label = this.playerLabels[id]
      if (label) {
        label.x += (target.x + TILE / 2 - label.x) * 0.3
        label.y += (target.y - 2 - label.y) * 0.3
      }
      const av = this.otherAvatars[id]
      if (av) {
        av.x += (target.x + TILE / 2 - av.x) * 0.3
        av.y += (target.y + TILE / 2 - 2 - av.y) * 0.3
      }
    })

    if (this.seated) return;

    if (isTextInputActive()) {
      this.moveTarget = null;
      this.checkNearby();
      return;
    }

    this.moveTimer += delta;
    if (this.moveTimer >= this.moveDelay) {
      let moved = false;
      let nx = this.playerGx;
      let ny = this.playerGy;

      if (this.cursors.left.isDown || this.wasd.left.isDown) { nx--; moved = true }
      else if (this.cursors.right.isDown || this.wasd.right.isDown) { nx++; moved = true }
      else if (this.cursors.up.isDown || this.wasd.up.isDown) { ny--; moved = true }
      else if (this.cursors.down.isDown || this.wasd.down.isDown) { ny++; moved = true }

      if (!moved && this.moveTarget) {
        const dx = this.moveTarget.x - this.playerGx
        const dy = this.moveTarget.y - this.playerGy
        if (Math.abs(dx) > 0 || Math.abs(dy) > 0) {
          if (Math.abs(dx) >= Math.abs(dy)) nx = this.playerGx + Math.sign(dx)
          else ny = this.playerGy + Math.sign(dy)
          moved = true
          if (nx === this.moveTarget.x && ny === this.moveTarget.y) this.moveTarget = null
        } else { this.moveTarget = null }
      }

      if (moved) {
        const blockedByPlayer = Object.values(this.otherGrids).some(g => g.x === nx && g.y === ny)
        if (!isBlocked(nx, ny) && !blockedByPlayer) {
          this.playerGx = nx;
          this.playerGy = ny;
          this.updatePlayerPos();
          this.moveTimer = 0;
          // 走一格立即透過 WebSocket 推送
          if (!isExiting && ws?.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'move', x: this.playerGx, y: this.playerGy, username: DISPLAY_NAME, display_name: MY_DISPLAY_NAME, avatar_mode: MY_AVATAR_MODE, avatar_url: DISPLAY_AVATAR_URL }))
          }
        } else if (blockedByPlayer && !this.bumpCooldown) {
          // 碰撞特效：縮放 + 閃爍
          this.bumpCooldown = true;
          this.tweens.add({
            targets: this.player,
            scaleX: 1.25,
            scaleY: 1.25,
            alpha: 0.4,
            duration: 80,
            yoyo: true,
            ease: 'Power2',
            onComplete: () => {
              this.player.setScale(1);
              this.player.setAlpha(1);
              this.bumpCooldown = false;
            }
          });
        }
      }
    }


    if (Phaser.Input.Keyboard.JustDown(this.wasd.interact)) this.tryInteract()

    this.checkNearby()

    // 同步位置（心跳，每5秒補漏）
    this.syncTimer += delta;
    if (this.syncTimer > 5000) {
      this.syncTimer = 0;
      if (!isExiting) {
        fetch(`${API_URL}/api/users/location`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ discord_id: MY_DISCORD_ID, map_x: this.playerGx, map_y: this.playerGy, map_scene: '咖啡廳' })
        }).catch(e => console.error('heartbeat error:', e))
        // WS 心跳：確保靜止玩家持續出現在他人視野
        if (ws?.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'move', x: this.playerGx, y: this.playerGy, username: DISPLAY_NAME, display_name: MY_DISPLAY_NAME, avatar_mode: MY_AVATAR_MODE, avatar_url: DISPLAY_AVATAR_URL }))
        }
      }
    }
  }

  checkNearby() {
    const hint = document.getElementById('interaction-hint')

    // 門口
    const atDoor = this.playerGy >= 10 && this.playerGx >= 7 && this.playerGx <= 9
    if (atDoor) {
      hint.textContent = '按 E 返回小鎮'
      hint.style.display = 'block'
      this.nearDoor = true
      this.nearCounter = false
      this.nearSeat = null
      return
    }
    this.nearDoor = false

    // 吧台
    const atCounter = this.playerGy === COUNTER_INTERACT_Y && this.playerGx >= 2 && this.playerGx <= 13
    if (atCounter) {
      hint.textContent = '按 E 點一杯飲料'
      hint.style.display = 'block'
      this.nearCounter = true
      this.nearSeat = null
      return
    }
    this.nearCounter = false

    // 座位
    let found = null
    for (const seat of SEATS) {
      const dx = Math.abs(this.playerGx - seat.x)
      const dy = Math.abs(this.playerGy - seat.y)
      if (dx <= 1 && dy <= 1) { found = seat; break }
    }

    if (found !== this.nearSeat) {
      this.nearSeat = found
      const hint = document.getElementById('interaction-hint')

      if (found && !this.seated) {
        fetch(`${API_URL}/api/users/scene/咖啡廳`)
          .then(r => r.json())
          .then(users => {
            if (this.nearSeat?.id !== found.id) return
            const occupied = Array.isArray(users) && users.some(u => u.seat_id === found.id && u.discord_id !== MY_DISCORD_ID)
            if (occupied) {
              hint.textContent = `🚫 座位 #${found.id} 已有人`
              hint.style.display = 'block'
              this.seatOccupied = true
            } else {
              hint.textContent = `按 E 坐下休息（座位 #${found.id}）`
              hint.style.display = 'block'
              this.seatOccupied = false
            }
          })
      } else if (!this.seated) {
        hint.style.display = 'none'
        this.seatOccupied = false
      }
    }
  }

  async tryInteract() {
    if (this.nearDoor) {
      clearInterval(pomo.interval);
      isExiting = true;
      if (ws) ws.close()
      try {
        await fetch(`${API_URL}/api/users/clear-location`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ discord_id: MY_DISCORD_ID })
        });
      } catch (e) {
        console.error('Clear location error:', e);
      }
      navigateTo('index.html');
      return;
    }
    if (this.nearCounter) {
      document.getElementById('drink-panel').classList.add('visible')
      return
    }
    if (this.nearSeat && !this.seated) {
      // 即時檢查座位
      const usersRes = await fetch(`${API_URL}/api/users/scene/咖啡廳`)
      const usersData = await usersRes.json()
      const occupied = Array.isArray(usersData) && usersData.some(u => u.seat_id === this.nearSeat.id && u.discord_id !== MY_DISCORD_ID)

      if (occupied) {
        document.getElementById('interaction-hint').textContent = `🚫 座位 #${this.nearSeat.id} 已有人`
        return
      }
      this.sitDown(this.nearSeat)
    }
  }

  async sitDown(seat) {
    this.seated = true;
    this.currentSeat = seat;
    pomo.seatId = seat.id;
    this.playerGx = seat.x;
    this.playerGy = seat.y;
    this.updatePlayerPos();
    // 廣播坐下位置給其他玩家
    if (!isExiting && ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'move', x: seat.x, y: seat.y, username: DISPLAY_NAME, display_name: MY_DISPLAY_NAME, avatar_mode: MY_AVATAR_MODE, avatar_url: DISPLAY_AVATAR_URL }))
    }
    this.tweens.add({ targets: this.player, scaleX: 0.85, scaleY: 0.85, duration: 200, ease: 'Power2' });
    document.getElementById('interaction-hint').style.display = 'none';
    document.getElementById('focus-seat').textContent = `座位 #${seat.id}`;
    document.getElementById('focus-panel').classList.add('visible');

    // 坐下：同步位置，但狀態為 browsing（尚未開始計時）
    await Promise.all([
      fetch(`${API_URL}/api/users/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, seat_id: seat.id, status: 'browsing', current_zone: '咖啡廳' })
      }),
      fetch(`${API_URL}/api/users/location`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, map_x: seat.x, map_y: seat.y, map_scene: '咖啡廳' })
      })
    ]);
  }

  async standUp() {
    this.seated = false;
    this.currentSeat = null;
    pomo.seatId = null;
    if (!isExiting && ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'move', x: this.playerGx, y: this.playerGy, username: DISPLAY_NAME, display_name: MY_DISPLAY_NAME, avatar_mode: MY_AVATAR_MODE, avatar_url: DISPLAY_AVATAR_URL }))
    }
    this.tweens.add({ targets: this.player, scaleX: 1, scaleY: 1, duration: 200, ease: 'Power2' });
    document.getElementById('focus-panel').classList.remove('visible');

    // 清除座位並等待完成
    await fetch(`${API_URL}/api/users/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, seat_id: null, status: 'browsing' })
    });
    
    // 重新檢查附近座位（強制刷新顯示）
    this.nearSeat = null;
    this.checkNearby();
  }

  async updateZone() {
    await Promise.all([
      fetch(`${API_URL}/api/users/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'browsing', current_zone: '咖啡廳' })
      }),
      fetch(`${API_URL}/api/users/location`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discord_id: MY_DISCORD_ID, map_x: this.playerGx, map_y: this.playerGy, map_scene: '咖啡廳' })
      })
    ])
  }

  async loadOtherPlayers() {
    const res = await fetch(`${API_URL}/api/users/scene/咖啡廳`)
    const allUsers = await res.json()
    const users = Array.isArray(allUsers) ? allUsers.filter(u => u.discord_id !== MY_DISCORD_ID) : null

    Object.values(this.otherPlayers).forEach(p => p.destroy())
    Object.values(this.playerLabels).forEach(l => l.destroy())
    this.otherPlayers = {}
    this.playerLabels = {};
    this.otherTargets = {};
    this.otherGrids = {};

    document.getElementById('online-count').textContent = (users?.length || 0) + 1;
    if (!users) return;

    users.forEach(user => {
      const gx = user.map_x || 8
      const gy = user.map_y || 10
      const isAnon = user.avatar_mode === 'anonymous'
      const displayName = getDisplayName(user)
      const teamColor = isAnon ? COLORS.playerAnon : (isTeammateId(user.discord_id) ? COLORS.playerTeam : COLORS.playerOther)
      const g = this.add.graphics()
      g.fillStyle(teamColor, 0.8)
      g.fillCircle(TILE / 2, TILE / 2 - 2, 12)
      g.setPosition(gx * TILE, gy * TILE)
      g.setInteractive(new Phaser.Geom.Circle(TILE/2, TILE/2-2, 14), Phaser.Geom.Circle.Contains)
      g.on('pointerdown', (ptr) => openDmMenu(user.discord_id, displayName, ptr.event.clientX, ptr.event.clientY))
      g.on('pointerover', () => { this.input.setDefaultCursor('pointer') })
      g.on('pointerout',  () => { this.input.setDefaultCursor('default') })
      this.otherPlayers[user.discord_id] = g
      this.otherTargets[user.discord_id] = { x: gx * TILE, y: gy * TILE }
      this.otherGrids[user.discord_id] = { x: gx, y: gy }

      const label = this.add.text(gx * TILE + TILE / 2, gy * TILE - 2, displayName, {
        fontSize: '10px', fontFamily: 'Noto Sans TC',
        color: '#ffffff', stroke: '#1a1208', strokeThickness: 3
      }).setOrigin(0.5, 1);
      this.playerLabels[user.discord_id] = label;

      // 載入頭像（匿名模式不顯示 Discord 頭像）
      const avatarKey = `avatar_${user.discord_id}`
      const avatarUrl = (!isAnon && user.discord_avatar)
        ? `https://cdn.discordapp.com/avatars/${user.discord_id}/${user.discord_avatar}.png?size=64`
        : null
      loadAvatarTexture(this, avatarKey, avatarUrl, (ok) => {
        if (!ok || !this.otherPlayers[user.discord_id]) return
        const sp = this.otherPlayers[user.discord_id]
        const av = this.add.image(sp.x + TILE / 2, sp.y + TILE / 2 - 2, avatarKey).setDisplaySize(26, 26).setDepth(1)
        this.otherAvatars[user.discord_id] = av
      })
    })
  }

  onPlayerMove(msg) {
    const { discord_id, x, y, username, display_name, avatar_mode, avatar_url } = msg
    const gx = x || 8
    const gy = y || 10
    const displayName = getDisplayName({ username, display_name, avatar_mode }) || discord_id
    const isAnon = avatar_mode === 'anonymous' || displayName === '同學'
    const color = isAnon ? COLORS.playerAnon : (isTeammateId(discord_id) ? COLORS.playerTeam : COLORS.playerOther)

    if (this.otherPlayers[discord_id]) {
      this.otherTargets[discord_id] = { x: gx * TILE, y: gy * TILE }
      this.otherGrids[discord_id] = { x: gx, y: gy }
      this.otherPlayers[discord_id].clear()
      this.otherPlayers[discord_id].fillStyle(color, 0.8)
      this.otherPlayers[discord_id].fillCircle(TILE / 2, TILE / 2 - 2, 12)
      // 身分切換：更新名稱標籤
      if (this.playerLabels[discord_id]) {
        this.playerLabels[discord_id].setText(displayName)
      }
      // 身分切換：顯示或隱藏頭像
      if (!avatar_url && this.otherAvatars[discord_id]) {
        this.otherAvatars[discord_id].destroy()
        delete this.otherAvatars[discord_id]
      } else if (avatar_url && !this.otherAvatars[discord_id]) {
        const avatarKey = `avatar_${discord_id}`
        loadAvatarTexture(this, avatarKey, avatar_url, (ok) => {
          if (!ok || !this.otherPlayers[discord_id]) return
          const sp = this.otherPlayers[discord_id]
          const av = this.add.image(sp.x + TILE / 2, sp.y + TILE / 2 - 2, avatarKey).setDisplaySize(26, 26).setDepth(1)
          this.otherAvatars[discord_id] = av
        })
      }
    } else {
      const g = this.add.graphics()
      g.fillStyle(color, 0.8)
      g.fillCircle(TILE / 2, TILE / 2 - 2, 12)
      g.setPosition(gx * TILE, gy * TILE)
      g.setInteractive(new Phaser.Geom.Circle(TILE/2, TILE/2-2, 14), Phaser.Geom.Circle.Contains)
      g.on('pointerdown', (ptr) => openDmMenu(discord_id, displayName, ptr.event.clientX, ptr.event.clientY))
      g.on('pointerover', () => { this.input.setDefaultCursor('pointer') })
      g.on('pointerout',  () => { this.input.setDefaultCursor('default') })
      this.otherPlayers[discord_id] = g
      this.otherTargets[discord_id] = { x: gx * TILE, y: gy * TILE }
      this.otherGrids[discord_id] = { x: gx, y: gy }

      const label = this.add.text(gx * TILE + TILE / 2, gy * TILE - 2, displayName, {
        fontSize: '10px', fontFamily: 'Noto Sans TC',
        color: '#ffffff', stroke: '#1a1208', strokeThickness: 3
      }).setOrigin(0.5, 1);
      this.playerLabels[discord_id] = label;

      // 載入頭像
      if (avatar_url) {
        const avatarKey = `avatar_${discord_id}`
        loadAvatarTexture(this, avatarKey, avatar_url, (ok) => {
          if (!ok || !this.otherPlayers[discord_id]) return
          const sp = this.otherPlayers[discord_id]
          const av = this.add.image(sp.x + TILE / 2, sp.y + TILE / 2 - 2, avatarKey).setDisplaySize(26, 26).setDepth(1)
          this.otherAvatars[discord_id] = av
        })
      }
    }

    document.getElementById('online-count').textContent = Object.keys(this.otherPlayers).length + 1;
    this.nearSeat = null;
  }

  onPlayerLeave(discord_id) {
    if (this.otherPlayers[discord_id]) {
      this.otherPlayers[discord_id].destroy()
      this.playerLabels[discord_id]?.destroy()
      this.otherAvatars[discord_id]?.destroy()
      delete this.otherPlayers[discord_id]
      delete this.playerLabels[discord_id]
      delete this.otherTargets[discord_id]
      delete this.otherGrids[discord_id]
      delete this.otherAvatars[discord_id]
    }
    document.getElementById('online-count').textContent = Object.keys(this.otherPlayers).length + 1;
    this.nearSeat = null;
  }
}

function getLiveTargetName(targetId, fallbackName = '') {
  try {
    const scene = game?.scene?.getScene('Cafe')
    const liveText = scene?.playerLabels?.[targetId]?.text
    if (typeof liveText === 'string' && liveText.trim()) return liveText.trim()
  } catch {}
  return fallbackName || '未知玩家'
}

function stopMenuNameSync() {
  if (menuNameSyncTimer) {
    clearInterval(menuNameSyncTimer)
    menuNameSyncTimer = null
  }
}

function openDmMenu(targetId, targetName, px, py) {
  _menuOpening = true
  const initialName = getLiveTargetName(targetId, targetName)
  dmTarget = { id: targetId, name: initialName }
  document.getElementById('menu-player-name').textContent = initialName
  document.getElementById('dm-input-row').classList.remove('visible')
  document.getElementById('dm-input').value = ''
  dmMenuEl.style.visibility = 'hidden'
  dmMenuEl.style.display = 'block'
  const menuWidth = dmMenuEl.offsetWidth || 180
  const menuHeight = dmMenuEl.offsetHeight || 170
  const canvasRect = document.querySelector('#game-container canvas')?.getBoundingClientRect()
  const bounds = canvasRect || { left: 8, top: 60, right: window.innerWidth - 8, bottom: window.innerHeight - 8 }
  let x = px + 20
  let y = py - menuHeight - 10
  if (x + menuWidth > bounds.right) x = px - menuWidth - 12
  if (y < bounds.top + 8) y = py + 28
  x = Math.max(bounds.left + 8, Math.min(x, bounds.right - menuWidth - 8))
  y = Math.max(bounds.top + 8, Math.min(y, bounds.bottom - menuHeight - 8))
  dmMenuEl.style.left = x + 'px'
  dmMenuEl.style.top  = y + 'px'
  dmMenuEl.style.visibility = 'visible'

  stopMenuNameSync()
  menuNameSyncTimer = setInterval(() => {
    if (dmMenuEl.style.display === 'none' || !dmTarget.id) return
    const liveName = getLiveTargetName(dmTarget.id, dmTarget.name)
    dmTarget.name = liveName
    document.getElementById('menu-player-name').textContent = liveName
  }, 400)
}

function formatMinutes(min) {
  if (!min || min === 0) return '0 分'
  if (min < 60) return `${min} 分`
  const h = Math.floor(min / 60)
  const m = min % 60
  return m > 0 ? `${h} 小時 ${m} 分` : `${h} 小時`
}

function calcLevel(xp) {
  if (xp < 100) return 1
  if (xp < 250) return 2
  if (xp < 500) return 3
  if (xp < 900) return 4
  if (xp < 1400) return 5
  return Math.floor(xp / 300) + 1
}

function xpForLevel(level) {
  const thresholds = [0, 100, 250, 500, 900, 1400]
  if (level <= 5) return thresholds[level]
  return level * 300
}

async function ensureUserExists() {

      username: session?.username || MY_USERNAME,
      avatar: session?.avatar || null,
      discord_avatar: session?.avatar || null,
      avatar_mode: localStorage.getItem('study_avatar_mode') || 'discord'
    }
    const safeDisplayName = (session?.display_name || MY_DISPLAY_NAME || '').trim().slice(0, 20)
    if (safeDisplayName) payload.display_name = safeDisplayName

    await fetch(`${API_URL}/api/users/upsert`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
  } catch (err) {
    console.warn('ensureUserExists failed:', err)
  }
}

async function openProfileModal() {
  document.getElementById('profile-modal').style.display = 'flex'
  await ensureUserExists()

  const parseJsonSafe = async (res, fallback) => {
    if (!res || !res.ok) return fallback
    const contentType = res.headers.get('content-type') || ''
    if (!contentType.includes('application/json')) return fallback
    try {
      return await res.json()
    } catch {
      return fallback
    }
  }

  const [profileRes, statsRes, recentRes] = await Promise.all([
    fetch(`${API_URL}/api/users/${MY_DISCORD_ID}/profile`).catch(() => null),
    fetch(`${API_URL}/api/users/${MY_DISCORD_ID}/stats`).catch(() => null),
    fetch(`${API_URL}/api/study/recent/${MY_DISCORD_ID}`).catch(() => null)
  ])

  const profile = await parseJsonSafe(profileRes, {
    username: MY_USERNAME,
    display_name: MY_DISPLAY_NAME,
    status_text: '',
    bio: '',
    is_profile_public: true,
    avatar_mode: MY_AVATAR_MODE || 'discord'
  })
  const stats = await parseJsonSafe(statsRes, { today: 0, week: 0, month: 0, total: 0, xp: 0 })
  const recent = await parseJsonSafe(recentRes, [])

  const session = JSON.parse(localStorage.getItem('study_user'))
  const avatarMode = profile.avatar_mode || MY_AVATAR_MODE || 'discord'
  document.getElementById('profile-avatar-img').src = getAvatarURLForMode(avatarMode, session?.avatar_url || MY_AVATAR_URL) || ''
  document.getElementById('identity-discord-avatar').src = session?.avatar_url || ''
  document.getElementById('identity-discord-name').textContent = session?.username || MY_USERNAME
  syncDisplayNameUI(avatarMode, {
    username: profile.username || session?.username || MY_USERNAME,
    display_name: (profile.display_name || session?.display_name || '').trim().slice(0, 20)
  })
  document.getElementById('status-input').value = profile.status_text || ''
  document.getElementById('bio-input').value = profile.bio || ''
  document.getElementById('bio-count').textContent = `${(profile.bio || '').length} / 100`
  document.getElementById('toggle-public').checked = profile.is_profile_public !== false
  setSelectedAvatarMode(avatarMode)

  document.getElementById('stat-today').textContent = formatMinutes(stats.today)
  document.getElementById('stat-week').textContent = formatMinutes(stats.week)
  document.getElementById('stat-month').textContent = formatMinutes(stats.month)
  document.getElementById('stat-total').textContent = formatMinutes(stats.total)

  const level = calcLevel(stats.xp || 0)
  const currentLevelXP = xpForLevel(level - 1)
  const nextLevelXP = xpForLevel(level)
  const progressXP = Math.max(0, (stats.xp || 0) - currentLevelXP)
  const neededXP = Math.max(1, nextLevelXP - currentLevelXP)
  const progress = Math.max(0, Math.min(100, (progressXP / neededXP) * 100))
  document.getElementById('xp-level-text').textContent = `Lv.${level} → Lv.${level + 1}`
  document.getElementById('xp-value-text').textContent = `${progressXP} / ${neededXP} XP`
  document.getElementById('xp-bar-fill').style.width = `${progress}%`
  document.getElementById('profile-level-badge').textContent = `Lv.${level}`

  const list = document.getElementById('recent-list')
  list.innerHTML = ''
  ;(recent || []).slice(0, 5).forEach(r => {
    const item = document.createElement('div')
    item.className = 'recent-item'
    item.innerHTML = `
      <span class="recent-zone">${r.zone || '未知區域'}</span>
      <span class="recent-duration">${formatMinutes(r.duration_minutes || 0)}</span>
      <span class="recent-xp">+${r.xp_earned || 0} XP</span>
    `
    list.appendChild(item)
  })

  captureProfileFormBaseline()
}

async function openOtherProfileModal(discord_id, fallbackName = '') {
  if (!discord_id) return
  document.getElementById('other-profile-modal').style.display = 'flex'
  const baseName = fallbackName || '未知玩家'

  const parseJsonSafe = async (res, fallback) => {
    if (!res || !res.ok) return fallback
    const contentType = res.headers.get('content-type') || ''
    if (!contentType.includes('application/json')) return fallback
    try {
      return await res.json()
    } catch {
      return fallback
    }
  }

  const [profileRes, statsRes] = await Promise.all([
    fetch(`${API_URL}/api/users/${discord_id}/profile?viewer_id=${MY_DISCORD_ID}`).catch(() => null),
    fetch(`${API_URL}/api/users/${discord_id}/stats`).catch(() => null)
  ])

  const profile = await parseJsonSafe(profileRes, { is_profile_public: false })
  const stats = await parseJsonSafe(statsRes, { week: 0, total: 0, xp: 0 })

  const privateMsg = document.getElementById('other-private-msg')
  const statsGrid = document.getElementById('other-stats-grid')
  const otherAvatar = document.getElementById('other-avatar-img')
  if (!profile.is_profile_public) {
    const privateName = getDisplayName({
      username: profile.username || baseName,
      display_name: profile.display_name || '',
      avatar_mode: profile.avatar_mode || (fallbackName === '同學' ? 'anonymous' : 'discord')
    })
    privateMsg.style.display = 'block'
    statsGrid.style.display = 'none'
    document.getElementById('other-bio').textContent = '此玩家將資料設為私密。'
    document.getElementById('other-username').textContent = privateName
    document.getElementById('other-status').textContent = '已關閉查看資料'
    document.getElementById('other-level-badge').textContent = ''
    otherAvatar.src = ''
    otherAvatar.style.display = 'none'
    return
  }

  privateMsg.style.display = 'none'
  statsGrid.style.display = 'grid'
  const isAnon = profile.avatar_mode === 'anonymous'
  if (!isAnon && profile.discord_avatar) {
    otherAvatar.src = `https://cdn.discordapp.com/avatars/${discord_id}/${profile.discord_avatar}.png?size=64`
    otherAvatar.style.display = 'block'
  } else {
    otherAvatar.src = ''
    otherAvatar.style.display = 'none'
  }
  document.getElementById('other-username').textContent = getDisplayName({
    username: profile.username || baseName,
    display_name: profile.display_name || '',
    avatar_mode: profile.avatar_mode
  })
  document.getElementById('other-status').textContent = profile.status_text || ''
  document.getElementById('other-bio').textContent = profile.bio || ''
  document.getElementById('other-level-badge').textContent = `Lv.${calcLevel(stats.xp || 0)}`
  document.getElementById('other-stat-week').textContent = formatMinutes(stats.week || 0)
  document.getElementById('other-stat-total').textContent = formatMinutes(stats.total || 0)
}

// ─── 組隊系統 ────────────────────────────────────────────────
let currentTeam = null
let teamRefreshInterval = null
let pendingInviteFromId = null

function getCurrentTeamIds() {
  return currentTeam?.teammate_ids || []
}

function isTeammateId(discordId) {
  return getCurrentTeamIds().includes(discordId)
}

function renderTeamMembers(teammates) {
  const container = document.getElementById('teammates-list')
  container.innerHTML = ''

  teammates.forEach((teammate) => {
    const isAnon = teammate.avatar_mode === 'anonymous'
    const name = getDisplayName(teammate)
    const avatarUrl = (!isAnon && teammate.discord_avatar)
      ? `https://cdn.discordapp.com/avatars/${teammate.discord_id}/${teammate.discord_avatar}.png?size=64`
      : null

    const card = document.createElement('div')
    card.className = 'teammate-card'
    card.innerHTML = `
      <div class="teammate-avatar">${avatarUrl ? `<img src="${avatarUrl}">` : '<span style="font-size:2rem">👤</span>'}</div>
      <div class="teammate-info">
        <div class="teammate-name">${name}</div>
        <div class="teammate-location">📍 ${teammate.current_zone || '離線'}</div>
        <div class="teammate-status">${teammate.status === 'studying' ? '🍅 讀書中' : '💤 休息中'}</div>
      </div>
    `
    container.appendChild(card)
  })
}

async function sendTeamInvite(targetId, targetName) {
  try {
    const res = await fetch(`${API_URL}/api/teams/invite`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from_id: MY_DISCORD_ID, to_id: targetId })
    })
    const data = await res.json()
    if (!res.ok || !data.success) {
      showToast(data.error || '邀請失敗')
      return
    }
    if (ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'team_invite', to_id: targetId, from_name: DISPLAY_NAME }))
    }
    showToast(`已邀請 ${targetName} 組隊 🤝`)
  } catch { showToast('邀請失敗') }
}

async function acceptTeamInvite() {
  if (!pendingInviteFromId) return
  try {
    const res = await fetch(`${API_URL}/api/teams/accept`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from_id: pendingInviteFromId, to_id: MY_DISCORD_ID })
    })
    const data = await res.json()
    if (!res.ok || !data.success) { showToast(data.error || '接受失敗'); return }
    if (ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'team_accepted', to_ids: (data.member_ids || []).filter(id => id !== MY_DISCORD_ID), by_name: DISPLAY_NAME }))
    }
    document.getElementById('team-invite-toast').classList.remove('visible')
    pendingInviteFromId = null
    await refreshTeammate()
  } catch { showToast('接受失敗') }
}

function rejectTeamInvite() {
  const fromId = pendingInviteFromId
  document.getElementById('team-invite-toast').classList.remove('visible')
  pendingInviteFromId = null
  if (!fromId) return
  fetch(`${API_URL}/api/teams/reject`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ from_id: fromId, to_id: MY_DISCORD_ID })
  }).catch(() => {})
}

async function disbandTeam() {
  if (!currentTeam) return
  try {
    const res = await fetch(`${API_URL}/api/teams/disband`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID })
    })
    const data = await res.json()
    if (!res.ok || !data.success) {
      showToast(data.error || '解散失敗')
      return
    }
    if (ws?.readyState === WebSocket.OPEN && data.affected_ids?.length) {
      ws.send(JSON.stringify({ type: 'team_disbanded', to_ids: data.affected_ids }))
    }
    currentTeam = null
    document.getElementById('team-panel').classList.remove('visible')
    clearInterval(teamRefreshInterval); teamRefreshInterval = null
    document.getElementById('teammates-list').innerHTML = ''
  } catch { showToast('解散失敗') }
}

function addTeamMessage(fromName, text, isSelf) {
  const container = document.getElementById('team-messages')
  const msgEl = document.createElement('div')
  msgEl.style.cssText = `padding: 4px 10px; border-radius: 10px; font-size: 0.75rem; max-width: calc(100% - 12px); box-sizing: border-box; overflow-wrap: anywhere; word-break: break-word; ${isSelf ? 'align-self: flex-end; background: rgba(48,200,120,0.15); color: #30c878;' : 'align-self: flex-start; background: rgba(255,255,255,0.06); color: #e6edf3;'}`
  msgEl.textContent = isSelf ? text : `${fromName}: ${text}`
  container.appendChild(msgEl)
  container.scrollTop = container.scrollHeight
}

function sendTeamMessage() {
  const input = document.getElementById('team-input')
  const text = input.value.trim()
  if (!text || !currentTeam || getCurrentTeamIds().length === 0) return
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'team_message', to_ids: getCurrentTeamIds(), text, from_name: DISPLAY_NAME }))
  }
  addTeamMessage(DISPLAY_NAME, text, true)
  input.value = ''
}

async function refreshTeammate() {
  try {
    const res = await fetch(`${API_URL}/api/teams/${MY_DISCORD_ID}`)
    const data = await res.json()
    const teammates = Array.isArray(data.teammates) ? data.teammates : []
    if (teammates.length === 0) {
      if (currentTeam) {
        currentTeam = null
        document.getElementById('team-panel').classList.remove('visible')
        clearInterval(teamRefreshInterval); teamRefreshInterval = null
        document.getElementById('teammates-list').innerHTML = ''
      }
      return
    }
    currentTeam = {
      teammate_ids: teammates.map(teammate => teammate.discord_id),
      teammates,
    }
    renderTeamMembers(teammates)
    document.getElementById('team-panel').classList.add('visible')
    if (!teamRefreshInterval) teamRefreshInterval = setInterval(refreshTeammate, 10000)
  } catch { /* silent */ }
}

function handleTeamWsMessage(msg) {
  if (msg.type === 'team_invite') {
    if (currentTeam?.teammate_ids?.length) return true
    pendingInviteFromId = msg.from_id
    document.getElementById('invite-from-name').textContent = msg.from_name
    const toast = document.getElementById('team-invite-toast')
    toast.classList.add('visible')
    setTimeout(() => {
      if (pendingInviteFromId === msg.from_id) { toast.classList.remove('visible'); pendingInviteFromId = null }
    }, 30000)
    return true
  }
  if (msg.type === 'team_accepted') { showToast(`${msg.by_name} 接受了你的邀請！`); refreshTeammate(); return true }
  if (msg.type === 'team_disbanded') {
    showToast('隊友已離開')
    refreshTeammate()
    return true
  }
  if (msg.type === 'team_message') { addTeamMessage(msg.from_name, msg.text, false); return true }
  return false
}

// ─── 番茄鐘 ────────────────────────────────────────
const pomo = {
  workMin: 25, breakMin: 5, longBreakMin: 15,
  longAfter: 4, targetRounds: 4,
  round: 0, phase: 'idle',
  remainSec: 0, sessionStart: null, sessionId: null, seatId: null, interval: null, running: false,
}

function formatTime(sec) {
  return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`
}

function readPomoSettings() {
  pomo.workMin      = Math.max(1, parseInt(document.getElementById('pomo-work').value) || 25)
  pomo.breakMin     = Math.max(1, parseInt(document.getElementById('pomo-break').value) || 5)
  pomo.longBreakMin = Math.max(1, parseInt(document.getElementById('pomo-long-break').value) || 15)
  pomo.longAfter    = Math.max(1, parseInt(document.getElementById('pomo-long-after').value) || 4)
  pomo.targetRounds = Math.max(1, parseInt(document.getElementById('pomo-rounds').value) || 4)
}

function updatePomoDots() {
  document.getElementById('pomo-dots').innerHTML =
    Array.from({length: pomo.targetRounds}, (_, i) => {
      if (i < pomo.round) return '🍅'
      if (i === pomo.round && pomo.phase === 'work') return '⏳'
      return '○'
    }).join('')
}

function updatePomoPhase() {
  const labels = { idle:'準備開始', work:'🍅 學習中', break:'☕ 短休息', longbreak:'🌙 長休息' }
  document.getElementById('pomo-phase').textContent = labels[pomo.phase] || ''
  const t = document.getElementById('focus-timer')
  if (pomo.phase === 'work') t.className = 'running'
  else if (pomo.phase === 'break' || pomo.phase === 'longbreak') t.className = 'break-mode'
  else t.className = ''
}

function updateXpPreview() {
  const el = document.getElementById('pomo-xp-preview')
  if (pomo.phase === 'work' && pomo.sessionStart) {
    const elapsed = Math.floor((Date.now() - pomo.sessionStart) / 60000)
    el.textContent = `已計 ${elapsed} 分 · 暫得 ${elapsed * 2} XP`
  } else if (pomo.phase === 'idle') {
    el.textContent = `完成1輪可得 ${(pomo.workMin * 2) + 20} XP`
  } else {
    el.textContent = ''
  }
}

function startPomoCountdown(seconds, onComplete) {
  clearInterval(pomo.interval)
  pomo.remainSec = seconds
  document.getElementById('focus-timer').textContent = formatTime(pomo.remainSec)
  pomo.interval = setInterval(() => {
    pomo.remainSec--
    document.getElementById('focus-timer').textContent = formatTime(pomo.remainSec)
    if (pomo.phase === 'work') updateXpPreview()
    if (pomo.remainSec <= 0) { clearInterval(pomo.interval); onComplete() }
  }, 1000)
}

function adjPomo(id, delta) {
  const el = document.getElementById(id)
  const min = parseInt(el.min) || 1
  const max = parseInt(el.max) || 999
  el.value = Math.min(max, Math.max(min, (parseInt(el.value) || 0) + delta))
}

async function pomoStartWorkPhase() {
  pomo.phase = 'work'
  pomo.running = true
  pomo.sessionStart = new Date()
  document.getElementById('pomo-settings').style.display = 'none'
  document.getElementById('btn-start').textContent = '進行中...'
  document.getElementById('btn-start').disabled = true
  updatePomoPhase()
  updatePomoDots()
  const [sessionRes] = await Promise.all([
    fetch(`${API_URL}/api/study/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, zone: '咖啡廳', seat_id: pomo.seatId })
    }),
    fetch(`${API_URL}/api/users/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'studying' })
    })
  ])
  const sessionData = await sessionRes.json()
  pomo.sessionId = sessionData.id
  startPomoCountdown(pomo.workMin * 60, pomoOnWorkComplete)
}

async function pomoOnWorkComplete() {
  pomo.round++
  await pomoSaveSession(true)
  updatePomoDots()
  if (pomo.round >= pomo.targetRounds) { await pomoFinishAll(); return }
  if (pomo.round % pomo.longAfter === 0) pomoStartBreak('longbreak', pomo.longBreakMin)
  else pomoStartBreak('break', pomo.breakMin)
}

function pomoStartBreak(type, minutes) {
  pomo.phase = type
  updatePomoPhase()
  updatePomoDots()
  updateXpPreview()
  startPomoCountdown(minutes * 60, pomoStartWorkPhase)
}

async function pomoFinishAll() {
  pomo.phase = 'idle'
  pomo.running = false
  const doneRounds = pomo.round
  pomo.round = 0
  document.getElementById('focus-timer').textContent = '🎉 完成！'
  document.getElementById('focus-timer').className = 'finished'
  document.getElementById('pomo-phase').textContent = `全 ${doneRounds} 輪完成！`
  document.getElementById('pomo-dots').innerHTML = '🍅'.repeat(doneRounds)
  document.getElementById('pomo-xp-preview').textContent = ''
  document.getElementById('pomo-settings').style.display = 'block'
  document.getElementById('btn-start').textContent = '再來一輪'
  document.getElementById('btn-start').disabled = false
}

async function pomoSaveSession(completed) {
  if (!pomo.sessionId) return
  try {
    await fetch(`${API_URL}/api/study/end`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, session_id: pomo.sessionId })
    })
  } catch (e) {
    console.error('pomoSaveSession error:', e)
  }
  pomo.sessionId = null
  await fetch(`${API_URL}/api/users/status`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'browsing' })
  }).catch(e => console.error('status update error:', e))
}

document.getElementById('btn-start').addEventListener('click', async () => {
  if (pomo.running) return
  readPomoSettings()
  pomo.round = 0
  updatePomoDots()
  updateXpPreview()
  await pomoStartWorkPhase()
})

document.getElementById('btn-stop').addEventListener('click', async () => {
  clearInterval(pomo.interval)
  const wasInWork = pomo.phase === 'work' && pomo.sessionStart
  // 先結算再重設，避免 sessionStart 被清掉
  if (wasInWork) await pomoSaveSession(false)
  pomo.phase = 'idle'
  pomo.running = false
  pomo.round = 0
  pomo.sessionStart = null
  const workMin = parseInt(document.getElementById('pomo-work').value) || 25
  document.getElementById('focus-timer').textContent = formatTime(workMin * 60)
  document.getElementById('focus-timer').className = ''
  document.getElementById('pomo-phase').textContent = '準備開始'
  document.getElementById('pomo-dots').innerHTML = ''
  document.getElementById('pomo-xp-preview').textContent = ''
  document.getElementById('pomo-settings').style.display = 'block'
  document.getElementById('btn-start').textContent = '開始'
  document.getElementById('btn-start').disabled = false
  if (!wasInWork) {
    await fetch(`${API_URL}/api/users/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ discord_id: MY_DISCORD_ID, status: 'browsing' })
    })
  }
  await game.scene.getScene('Cafe').standUp()
})
